# Team name canonicalization.
#
# Football data sources use wildly inconsistent team names. football-data.co.uk
# uses "Real Madrid", football-data.org uses "Real Madrid CF", API-Football
# uses "Real Madrid", TheSportsDB uses "Real Madrid". When the same club gets
# fragmented across these names, the Dixon-Coles model treats them as separate
# teams — wrong predictions, broken cross-source joins.
#
# Each entry: canonical name → list of variants seen in the wild. The variants
# also recognize Chinese names so the UI autocomplete can search bilingually.
#
# Format:
#   canonical_name:
#     aliases: [list of source-specific names]
#     zh: optional Chinese display name
#
# Used by data/team_normalize.py:canonicalize(name).

# ============================================================
# England — Premier League / Championship / League One
# ============================================================
"Arsenal":
  aliases: ["Arsenal FC"]
  zh: "阿森纳"
"Aston Villa":
  aliases: ["Aston Villa FC"]
  zh: "阿斯顿维拉"
"Chelsea":
  aliases: ["Chelsea FC"]
  zh: "切尔西"
"Liverpool":
  aliases: ["Liverpool FC"]
  zh: "利物浦"
"Manchester City":
  aliases: ["Man City", "Manchester City FC"]
  zh: "曼城"
"Manchester United":
  aliases: ["Man United", "Man Utd", "Manchester United FC", "Manchester Utd"]
  zh: "曼联"
"Tottenham":
  aliases: ["Tottenham Hotspur", "Tottenham Hotspur FC", "Spurs"]
  zh: "热刺"
"Newcastle":
  aliases: ["Newcastle United", "Newcastle United FC", "Newcastle Utd"]
  zh: "纽卡斯尔"
# fd.co.uk uses short names ("Brighton", "Leeds"); fd.org uses long forms
# ("Brighton & Hove Albion", "Leeds United"). Without these aliases the same
# team is stored as two separate canonicals → model double-counts and audit
# can't join. Discovered via the Arsenal-vs-Burnley investigation
# (final-matchday count showed 24 PL "teams" instead of 20).
"Brighton":
  aliases: ["Brighton & Hove Albion", "Brighton and Hove Albion", "Brighton Hove"]
  zh: "布莱顿"
"Leeds":
  aliases: ["Leeds United", "Leeds United FC", "Leeds Utd"]
  zh: "利兹联"
"West Ham":
  aliases: ["West Ham United", "West Ham United FC", "West Ham Utd"]
  zh: "西汉姆联"
"Wolves":
  aliases: ["Wolverhampton Wanderers", "Wolverhampton Wanderers FC", "Wolverhampton"]
  zh: "狼队"
"Nottingham Forest":
  aliases: ["Nottm Forest", "Nottingham Forest FC"]
  zh: "诺丁汉森林"
"Nottingham Forest":
  aliases: ["Nott'm Forest", "Nottm Forest", "Nottingham Forest FC"]
  zh: "诺丁汉森林"

