# League registry.
#
# Each entry maps a logical league to its data sources.
#   football_data_code: code used by https://www.football-data.co.uk/ CSV exports
#     (None when the league is not covered by football-data.co.uk).
#   clubelo: whether http://clubelo.com/ tracks teams in this league.
#   fbref_id: numeric competition id on FBref (used for xG enrichment).
#   tier: ranks coverage quality. 1 = full (Elo + xG + results),
#         2 = Elo + results, 3 = results only.
#   note: caveat surfaced in CLI output.

