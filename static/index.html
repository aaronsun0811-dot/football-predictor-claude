<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Football Predictor</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div x-data="app()" x-init="init()" class="min-h-screen flex flex-col">
    <!-- ===== Header ===== -->
    <header class="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-slate-200">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
        <h1 class="text-lg font-bold tracking-tight">
          <span class="text-2xl mr-1">⚽</span>Football Predictor
        </h1>
        <nav class="flex gap-1 text-sm font-medium flex-wrap">
          <button @click="tab='match'" :class="tab==='match' ? activeTab : inactiveTab" x-text="$t('tab_match')"></button>
          <button @click="tab='worldcup'" :class="tab==='worldcup' ? activeTab : inactiveTab" x-text="$t('tab_worldcup')"></button>
          <button @click="tab='leagues'" :class="tab==='leagues' ? activeTab : inactiveTab" x-text="$t('tab_leagues')"></button>
          <button @click="tab='backtest'" :class="tab==='backtest' ? activeTab : inactiveTab" x-text="$t('tab_backtest')"></button>
          <button @click="tab='diagnostics'" :class="tab==='diagnostics' ? activeTab : inactiveTab" x-text="$t('tab_diagnostics')"></button>
          <button @click="tab='value'" :class="tab==='value' ? activeTab : inactiveTab" x-text="$t('tab_value')"></button>
          <button @click="tab='roi'" :class="tab==='roi' ? activeTab : inactiveTab" x-text="$t('tab_roi')"></button>
          <button @click="tab='continental'" :class="tab==='continental' ? activeTab : inactiveTab" x-text="$t('tab_continental')"></button>
          <button @click="tab='inplay'" :class="tab==='inplay' ? activeTab : inactiveTab" x-text="$t('tab_inplay')"></button>
          <button @click="tab='strengths'" :class="tab==='strengths' ? activeTab : inactiveTab" x-text="$t('tab_strengths')"></button>
          <button @click="tab='replay'" :class="tab==='replay' ? activeTab : inactiveTab" x-text="$t('tab_replay')"></button>
          <button @click="tab='upcoming'" :class="tab==='upcoming' ? activeTab : inactiveTab" x-text="$t('tab_upcoming')"></button>
          <button @click="tab='health'" :class="tab==='health' ? activeTab : inactiveTab" x-text="$t('tab_health')"></button>
          <button @click="tab='about'" :class="tab==='about' ? activeTab : inactiveTab" x-text="$t('tab_about')"></button>
        </nav>
        <div class="ml-auto flex items-center gap-3 text-xs text-slate-500">
          <span x-show="stats.matches" x-cloak>
            <span class="font-mono" x-text="stats.matches?.toLocaleString()"></span> <span x-text="$t('matches_count')"></span>
            ·
            <span class="font-mono" x-text="stats.teams?.toLocaleString()"></span> <span x-text="$t('teams_count')"></span>
            ·
            <span class="font-mono" x-text="stats.leagues_with_data"></span> <span x-text="$t('leagues_count')"></span>
          </span>
          <span class="inline-flex items-center gap-1.5" x-show="health.status==='ok'">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span><span x-text="$t('online')"></span>
          </span>
          <span class="inline-flex items-center gap-1.5" x-show="health.status!=='ok'">
            <span class="w-2 h-2 rounded-full bg-rose-500"></span><span x-text="$t('offline')"></span>
          </span>
          <button @click="toggleLang()"
                  class="inline-flex items-center gap-1 px-2 py-1 rounded border border-slate-300 text-xs hover:bg-slate-100 font-semibold tabular-nums">
            <span x-show="lang==='zh'" x-text="$t('ui_lang_zh_label')"></span>
            <span x-show="lang==='en'">EN</span>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8">
      <!-- ===== MATCH TAB ===== -->
      <section x-show="tab==='match'" x-cloak>
        <h2 class="text-2xl font-bold mb-1" x-text="$t('tab_match')"></h2>
        <p class="text-slate-600 mb-6 text-sm" x-text="$t('match_subtitle')"></p>

        <!-- Compact one-row predict form. Primary fields (league/home/away)
             always visible; less-common toggles (neutral / knockout / model)
             tucked behind a "more options" disclosure to keep the bar tight. -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200 mb-5">
          <div class="flex flex-wrap items-end gap-3">
            <!-- League -->
            <div class="flex flex-col min-w-[180px] flex-grow basis-[180px]">
              <label class="text-[10px] font-semibold text-slate-600 uppercase mb-1" x-text="$t('league')"></label>
              <select x-model="form.league" @change="loadTeams()" class="rounded-lg border-slate-300 text-sm py-1.5">
                <option value="" x-text="$t('all_auto')"></option>
                <template x-for="l in leagues" :key="l.key">
                  <option :value="l.key" x-text="l.name + ' · T' + l.tier"></option>
                </template>
              </select>
            </div>
            <!-- Home team -->
            <div class="flex flex-col min-w-[160px] flex-grow basis-[160px]">
              <label class="text-[10px] font-semibold text-slate-600 uppercase mb-1" x-text="$t('home_team')"></label>
              <input list="teams-list" x-model="form.home_team" placeholder="Arsenal"
                     class="rounded-lg border-slate-300 text-sm py-1.5" />
            </div>
            <!-- Away team -->
            <div class="flex flex-col min-w-[160px] flex-grow basis-[160px]">
              <label class="text-[10px] font-semibold text-slate-600 uppercase mb-1" x-text="$t('away_team')"></label>
              <input list="teams-list" x-model="form.away_team" placeholder="Chelsea"
                     class="rounded-lg border-slate-300 text-sm py-1.5" />
            </div>
            <datalist id="teams-list">
              <template x-for="t in teams" :key="t">
                <option :value="t"></option>
              </template>
            </datalist>
            <!-- Predict button -->
            <button @click="predict()" :disabled="loading.predict"
                    class="bg-slate-900 text-white rounded-lg px-5 py-1.5 text-sm font-medium hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed">
              <span x-show="!loading.predict" x-text="$t('predict')"></span>
              <span x-show="loading.predict" x-text="$t('calculating')"></span>
            </button>
          </div>

          <!-- Secondary controls (collapsed by default) -->
          <details class="mt-2 group">
            <summary class="text-[11px] text-slate-500 cursor-pointer hover:text-slate-800 select-none inline-flex items-center gap-1">
              <span x-text="$t('more_options')"></span>
              <span class="text-[9px] opacity-60">▾</span>
            </summary>
            <div class="flex flex-wrap items-center gap-4 mt-2 pt-2 border-t border-slate-100">
              <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="form.neutral_site" class="rounded" />
                <span x-text="$t('neutral_site')"></span>
              </label>
              <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="form.knockout" class="rounded" />
                <span x-text="$t('knockout')"></span>
              </label>
              <div class="flex items-center gap-2 text-sm">
                <span class="text-[11px] text-slate-600 font-semibold" x-text="$t('model')"></span>
                <select x-model="form.model" class="rounded-lg border-slate-300 text-xs py-1">
                  <option value="dixon_coles_elo" x-text="lang==='en' ? 'DC + Elo (default, over-confident)' : 'DC + Elo（默认，但过信）'"></option>
                  <option value="ensemble" x-text="lang==='en' ? 'Ensemble (3-model avg)' : 'Ensemble（3 模型平均）'"></option>
                  <option value="market_fused" x-text="lang==='en' ? 'Market-Fused (most stable)' : 'Market-Fused（理论最稳）'"></option>
                  <option value="dixon_coles" x-text="lang==='en' ? 'Dixon-Coles (penaltyblog)' : 'Dixon-Coles（penaltyblog）'"></option>
                  <option value="bivariate_poisson">Bivariate Poisson</option>
                  <option value="poisson" x-text="lang==='en' ? 'Poisson (baseline)' : 'Poisson（基线）'"></option>
                </select>
              </div>
            </div>
          </details>
          <p class="text-rose-600 text-xs mt-2" x-show="error.predict" x-text="error.predict"></p>
        </div>

        <!-- Result of the user's manual prediction. Renders below the compact
             form when ``result`` is populated. Nothing here if the user hasn't
             clicked Predict yet — we let the fixture board take the space.
             The actual result-content divs (probabilities/hero/xG/Elo/...) are
             moved here from the old col-span-3 grid further down. -->
        <div id="manual-predict-result-container" class="space-y-4 mb-8" x-show="result || loading.predict">
            <template x-if="!result && !loading.predict">
              <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center text-slate-400 text-sm"
                   x-text="$t('choose_teams')">
              </div>
            </template>

            <!-- Metadata-only matchup card: shown when the model can't be
                 fit (no training data for this league) but we still know team
                 identities. Lets the user see "yes, that's the matchup" even
                 without probabilities. -->
            <template x-if="result && result.prediction_available === false">
              <div class="bg-gradient-to-br from-slate-50 to-white rounded-xl p-6 shadow-sm border border-amber-200">
                <div class="grid grid-cols-7 items-center gap-3">
                  <div class="col-span-2 flex flex-col items-center text-center">
                    <template x-if="result.home_badge_url && !isBadgeBroken(result.home_badge_url)">
                      <img :src="result.home_badge_url" :alt="result.home_team"
                           @error="markBadgeBroken(result.home_badge_url)"
                           class="w-16 h-16 object-contain mb-2" loading="lazy" />
                    </template>
                    <template x-if="!result.home_badge_url || isBadgeBroken(result.home_badge_url)">
                      <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md mb-2"
                           :style="`background-color: ${teamColor(result.home_team)}`"
                           x-text="teamMonogram(result.home_team)"></div>
                    </template>
                    <div class="font-semibold text-slate-900 truncate w-full text-sm" x-text="result.home_team"></div>
                  </div>
                  <div class="col-span-3 flex flex-col items-center">
                    <div class="text-[10px] uppercase tracking-wider text-amber-700 font-semibold mb-2"
                         x-text="$t('metadata_only_warn')"></div>
                    <div class="text-3xl text-slate-300 font-light">vs</div>
                    <div class="text-[11px] text-slate-500 mt-2 text-center px-2"
                         x-text="result.unavailable_detail || $t('metadata_only_fallback_detail')"></div>
                  </div>
                  <div class="col-span-2 flex flex-col items-center text-center">
                    <template x-if="result.away_badge_url && !isBadgeBroken(result.away_badge_url)">
                      <img :src="result.away_badge_url" :alt="result.away_team"
                           @error="markBadgeBroken(result.away_badge_url)"
                           class="w-16 h-16 object-contain mb-2" loading="lazy" />
                    </template>
                    <template x-if="!result.away_badge_url || isBadgeBroken(result.away_badge_url)">
                      <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md mb-2"
                           :style="`background-color: ${teamColor(result.away_team)}`"
                           x-text="teamMonogram(result.away_team)"></div>
                    </template>
                    <div class="font-semibold text-slate-900 truncate w-full text-sm" x-text="result.away_team"></div>
                  </div>
                </div>
                <!-- H2H still useful — pulls from full matches table, not just
                     the requested league. Cross-competition history is real. -->
                <template x-if="result.h2h_recent?.length">
                  <div class="mt-4 pt-3 border-t border-slate-100">
                    <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2"
                         x-text="$t('h2h_other_leagues')"></div>
                    <div class="flex flex-wrap gap-2">
                      <template x-for="m in result.h2h_recent" :key="m.date + m.home_team">
                        <div class="flex flex-col items-center min-w-[56px] flex-1 bg-white rounded-lg p-1.5 border border-slate-100">
                          <div class="text-sm font-bold tabular-nums" x-text="m.score_for_current_home"></div>
                          <div class="mt-0.5 px-1.5 py-0.5 rounded-full text-[9px] font-bold text-white"
                               :class="m.outcome_for_home === 'W' ? 'bg-emerald-500'
                                       : (m.outcome_for_home === 'L' ? 'bg-rose-500' : 'bg-slate-400')"
                               x-text="m.outcome_for_home"></div>
                          <div class="text-[9px] text-slate-400 mt-0.5 font-mono" x-text="m.date"></div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="result && result.prediction_available !== false">
              <div class="space-y-4">
                <!-- Matchup hero: two-team face-off with predicted score in the middle.
                     Visual focal point of the prediction — color-coded monograms,
                     big score, win bar underneath. -->
                <div class="bg-gradient-to-br from-slate-50 to-white rounded-xl p-6 shadow-sm border border-slate-200">
                  <div class="grid grid-cols-7 items-center gap-3">
                    <!-- Home -->
                    <div class="col-span-2 flex flex-col items-center text-center">
                      <template x-if="result.home_badge_url && !isBadgeBroken(result.home_badge_url)">
                        <img :src="result.home_badge_url" :alt="result.home_team"
                             @error="markBadgeBroken(result.home_badge_url)"
                             class="w-16 h-16 object-contain mb-2"
                             loading="lazy" />
                      </template>
                      <template x-if="!result.home_badge_url || isBadgeBroken(result.home_badge_url)">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md mb-2"
                             :style="`background-color: ${teamColor(result.home_team)}`"
                             x-text="teamMonogram(result.home_team)"></div>
                      </template>
                      <div class="font-semibold text-slate-900 truncate w-full text-sm" x-text="result.home_team"></div>
                      <div class="text-[10px] text-slate-500 mt-0.5" x-show="result.model?.home_elo">
                        Elo <span class="font-mono tabular-nums" x-text="result.model?.home_elo?.toFixed(0)"></span>
                      </div>
                      <div class="text-[10px] text-emerald-700 font-semibold mt-1"
                           x-text="(result.probabilities.home_win*100).toFixed(1)+'% ' + $t('home_win_short')"></div>
                    </div>

                    <!-- Center: predicted score + draw% -->
                    <div class="col-span-3 flex flex-col items-center">
                      <div class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold mb-1" x-text="$t('match_most_likely_score')">
                        
                      </div>
                      <template x-if="result.most_likely_scores?.length">
                        <div class="flex items-baseline gap-3">
                          <span class="text-5xl font-bold tabular-nums"
                                :style="`color: ${teamColor(result.home_team)}`"
                                x-text="result.most_likely_scores[0].home_goals"></span>
                          <span class="text-3xl text-slate-300 font-light">–</span>
                          <span class="text-5xl font-bold tabular-nums"
                                :style="`color: ${teamColor(result.away_team)}`"
                                x-text="result.most_likely_scores[0].away_goals"></span>
                        </div>
                      </template>
                      <template x-if="!result.most_likely_scores?.length">
                        <div class="flex items-baseline gap-3">
                          <span class="text-4xl font-bold tabular-nums text-emerald-600"
                                x-text="result.expected_goals.home.toFixed(1)"></span>
                          <span class="text-3xl text-slate-300 font-light">–</span>
                          <span class="text-4xl font-bold tabular-nums text-indigo-600"
                                x-text="result.expected_goals.away.toFixed(1)"></span>
                        </div>
                      </template>
                      <div class="text-[10px] text-slate-400 mt-1"
                           x-show="result.most_likely_scores?.length">
                        <span x-text="$t('match_score_prob_inline')"></span>
                        <span class="font-semibold tabular-nums"
                              x-text="(result.most_likely_scores[0].probability*100).toFixed(1)+'%'"></span>
                      </div>
                      <div class="text-[11px] text-slate-500 mt-2 font-semibold"
                           x-text="$t('draw_short') + ' ' + (result.probabilities.draw*100).toFixed(1)+'%'"></div>
                    </div>

                    <!-- Away -->
                    <div class="col-span-2 flex flex-col items-center text-center">
                      <template x-if="result.away_badge_url && !isBadgeBroken(result.away_badge_url)">
                        <img :src="result.away_badge_url" :alt="result.away_team"
                             @error="markBadgeBroken(result.away_badge_url)"
                             class="w-16 h-16 object-contain mb-2"
                             loading="lazy" />
                      </template>
                      <template x-if="!result.away_badge_url || isBadgeBroken(result.away_badge_url)">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md mb-2"
                             :style="`background-color: ${teamColor(result.away_team)}`"
                             x-text="teamMonogram(result.away_team)"></div>
                      </template>
                      <div class="font-semibold text-slate-900 truncate w-full text-sm" x-text="result.away_team"></div>
                      <div class="text-[10px] text-slate-500 mt-0.5" x-show="result.model?.away_elo">
                        Elo <span class="font-mono tabular-nums" x-text="result.model?.away_elo?.toFixed(0)"></span>
                      </div>
                      <div class="text-[10px] text-indigo-700 font-semibold mt-1"
                           x-text="(result.probabilities.away_win*100).toFixed(1)+'% ' + $t('away_win_short')"></div>
                    </div>
                  </div>

                  <!-- Visual probability bar at the bottom of the hero -->
                  <div class="mt-5 flex h-2 rounded-full overflow-hidden">
                    <div :style="`width: ${result.probabilities.home_win*100}%; background-color: ${teamColor(result.home_team)}`"></div>
                    <div class="bg-slate-300"
                         :style="`width: ${result.probabilities.draw*100}%`"></div>
                    <div :style="`width: ${result.probabilities.away_win*100}%; background-color: ${teamColor(result.away_team)}`"></div>
                  </div>
                  <div class="flex justify-between text-[10px] text-slate-400 mt-1.5 tabular-nums">
                    <span x-text="result.home_team"></span>
                    <span x-text="$t('train_samples') + ' ' + (result.model?.training_rows?.toLocaleString() ?? '—')"></span>
                    <span x-text="result.away_team"></span>
                  </div>
                </div>

                <!-- H2H last 5 — only renders when there's history between these
                     teams. Each chip is colored from the perspective of the
                     CURRENT home team (green=W, slate=D, rose=L). Above each
                     chip is the score from the same perspective; below, the
                     date + whether the current home was H or A in that game. -->
                <template x-if="result.h2h_recent?.length">
                  <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                    <div class="flex items-center justify-between mb-3">
                      <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                        <span x-text="$t('h2h_recent_prefix')"></span> <span x-text="result.h2h_recent.length"></span> <span x-text="$t('h2h_recent_suffix')"></span>
                      </h3>
                      <div class="flex items-center gap-1 text-[10px] text-slate-500">
                        <span x-text="result.home_team"></span> <span x-text="$t('perspective')"></span>:
                        <span class="inline-flex items-center gap-1">
                          <span class="w-2 h-2 rounded-full bg-emerald-500"></span><span x-text="$t('h2h_win_legend')"></span>
                          <span class="w-2 h-2 rounded-full bg-slate-400 ml-1"></span><span x-text="$t('h2h_draw_legend')"></span>
                          <span class="w-2 h-2 rounded-full bg-rose-500 ml-1"></span><span x-text="$t('h2h_loss_legend')"></span>
                        </span>
                      </div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                      <template x-for="m in result.h2h_recent" :key="m.date + m.home_team">
                        <div class="flex flex-col items-center min-w-[64px] flex-1 bg-slate-50 rounded-lg p-2">
                          <!-- Score from current home's POV -->
                          <div class="text-base font-bold tabular-nums leading-tight"
                               x-text="m.score_for_current_home"></div>
                          <!-- W/D/L pill -->
                          <div class="mt-1 px-2 py-0.5 rounded-full text-[10px] font-bold text-white"
                               :class="m.outcome_for_home === 'W' ? 'bg-emerald-500'
                                       : (m.outcome_for_home === 'L' ? 'bg-rose-500' : 'bg-slate-400')"
                               x-text="m.outcome_for_home"></div>
                          <!-- Date + H/A indicator -->
                          <div class="text-[10px] text-slate-500 mt-1 tabular-nums font-mono"
                               x-text="m.date"></div>
                          <div class="text-[9px] text-slate-400"
                               x-text="m.venue_for_current_home === 'H' ? $t('venue_home') : $t('venue_away')"></div>
                        </div>
                      </template>
                    </div>
                    <!-- Aggregate W-D-L summary -->
                    <div class="mt-3 text-[11px] text-slate-500 text-center">
                      <span class="text-emerald-700 font-semibold tabular-nums"
                            x-text="result.h2h_recent.filter(m => m.outcome_for_home === 'W').length"></span><span x-text="$t('h2h_win_short')"></span>
                      <span class="text-slate-400 mx-1">·</span>
                      <span class="text-slate-700 font-semibold tabular-nums"
                            x-text="result.h2h_recent.filter(m => m.outcome_for_home === 'D').length"></span><span x-text="$t('h2h_draw_short')"></span>
                      <span class="text-slate-400 mx-1">·</span>
                      <span class="text-rose-700 font-semibold tabular-nums"
                            x-text="result.h2h_recent.filter(m => m.outcome_for_home === 'L').length"></span><span x-text="$t('h2h_loss_short')"></span>
                    </div>
                  </div>
                </template>

                <!-- Probabilities -->
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                  <div class="flex items-baseline justify-between mb-3">
                    <h3 class="font-semibold text-slate-900">
                      <span x-text="result.home_team"></span>
                      <span class="text-slate-400 font-normal mx-1">vs</span>
                      <span x-text="result.away_team"></span>
                    </h3>
                    <span class="text-xs text-slate-500" x-show="result.model?.training_rows">
                      <span x-text="$t('train_samples')"></span> <span class="font-mono" x-text="result.model.training_rows.toLocaleString()"></span>
                      <span x-show="result.model?.xg_training_rows">

                    <div class="bg-emerald-500 flex items-center justify-center"
                         :style="`width: ${result.probabilities.home_win*100}%`">
                      <span x-show="result.probabilities.home_win > 0.06">

                      </span>
                    </div>
                    <div class="bg-slate-400 flex items-center justify-center"
                         :style="`width: ${result.probabilities.draw*100}%`">
                      <span x-show="result.probabilities.draw > 0.06">
                        <span x-text="$t('draw')"></span> <span x-text="(result.probabilities.draw*100).toFixed(1)+'%'"></span>
                      </span>
                    </div>
                    <div class="bg-indigo-500 flex items-center justify-center"
                         :style="`width: ${result.probabilities.away_win*100}%`">
                      <span x-show="result.probabilities.away_win > 0.06">
                        <span x-text="$t('away_win')"></span> <span x-text="(result.probabilities.away_win*100).toFixed(1)+'%'"></span>
                      </span>
                    </div>
                  </div>
                  <div class="flex justify-between text-[11px] text-slate-500 mt-1.5">
                    <span x-text="(result.probabilities.home_win*100).toFixed(1)+'% ' + $t('home_win_short')"></span>
                    <span x-text="(result.probabilities.draw*100).toFixed(1)+'% ' + $t('draw_word')"></span>
                    <span x-text="(result.probabilities.away_win*100).toFixed(1)+'% ' + $t('away_win_short')"></span>

                    </div>
                  </div>
                  <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                    <div class="text-xs text-slate-500 font-semibold mb-1.5" x-text="$t('match_elo_label')"></div>
                    <div class="flex items-baseline gap-2 text-sm">
                      <span class="font-mono tabular-nums" x-text="result.model?.home_elo?.toFixed(0) ?? '—'"></span>

                      <span class="font-mono tabular-nums" x-text="result.model?.away_elo?.toFixed(0) ?? '—'"></span>
                      <span class="ml-auto text-xs text-slate-500" x-show="result.model?.elo_scope" x-text="result.model.elo_scope"></span>
                    </div>
                  </div>
                </div>

                        <span class="w-14 font-mono tabular-nums" x-text="s.home_goals + ' – ' + s.away_goals"></span>

                          <div class="bg-slate-700 h-2" :style="`width: ${s.probability*100*4}%`"></div>
                        </div>
                        <span class="w-12 text-right tabular-nums text-xs text-slate-600" x-text="(s.probability*100).toFixed(1)+'%'"></span>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- Score matrix heatmap -->

                    <table class="text-xs tabular-nums w-full">
                      <thead>
                        <tr>
                          <th class="text-left text-slate-400 font-normal pr-2" x-text="$t('match_matrix_corner')"></th>
                          <template x-for="(_, j) in result.score_matrix[0]" :key="'h'+j">
                            <th class="px-1 text-slate-400 font-normal" x-text="j"></th>
                          </template>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="(row, i) in result.score_matrix" :key="'r'+i">

                            <td class="text-slate-400 pr-2" x-text="i"></td>

                                <div class="rounded"

                              </td>
                            </template>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                  <p class="text-[11px] text-slate-400 mt-2" x-text="$t('match_matrix_legend')"></p>
                </div>
              </div>
            </template>
        </div>

        <!-- Live fixture board (sports-scores style). Moved BELOW the predict
             form per user feedback — primary user flow now starts with their
             own match, then browses the rest. -->
        <div class="mb-8" x-show="upcomingResult && upcomingResult.fixtures && upcomingResult.fixtures.length > 0">

                <div class="flex items-center justify-between text-[10px] text-slate-500 mb-2">

                    <span class="font-mono" x-text="fx.date"></span>
                    <span x-show="fx.time_utc" x-text="fx.time_utc + ' UTC'"></span>
                    <span class="px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 font-medium" x-text="fx.league_key"></span>
                    <template x-if="fx.date_check && fx.date_check.status === 'warning'">
                      <span class="inline-flex items-center px-1 py-0.5 rounded bg-amber-100 text-amber-800 text-[9px] font-semibold"
                            :title="$t('date_warn_title_prefix') + ' ' + fx.date_check.fdorg_date">
                        📅
                      </span>
                    </template>
                  </div>
                  <span class="text-slate-300 group-hover:text-slate-600" :title="$t('upcoming_click_to_expand_title')">→</span>
                </div>

                <div class="grid grid-cols-7 items-center gap-2">
                  <!-- Home -->
                  <div class="col-span-2 flex flex-col items-center text-center">
                    <template x-if="fx.home_badge_url && !isBadgeBroken(fx.home_badge_url)">
                      <img :src="fx.home_badge_url" :alt="fx.home_team"

                           class="w-11 h-11 object-contain"
                           loading="lazy" />
                    </template>
                    <template x-if="!fx.home_badge_url || isBadgeBroken(fx.home_badge_url)">
                      <div class="w-11 h-11 rounded-full flex items-center justify-center text-white text-sm font-bold shadow"

                           x-text="teamMonogram(fx.home_team)"></div>
                    </template>
                    <div class="text-[11px] font-semibold mt-1.5 truncate w-full" x-text="fx.home_team"></div>
                    <div class="text-[10px] text-emerald-700 font-semibold mt-0.5"
                         x-show="fx.prediction?.probabilities"
                         x-text="(fx.prediction.probabilities.home_win*100).toFixed(0)+'%'"></div>
                  </div>

                  <!-- Center: score / draw% -->
                  <div class="col-span-3 flex flex-col items-center">
                    <template x-if="fx.prediction?.most_likely_scores?.length">
                      <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold tabular-nums"
                              :style="`color: ${teamColor(fx.home_team)}`"
                              x-text="fx.prediction.most_likely_scores[0].home_goals"></span>
                        <span class="text-xl text-slate-300 font-light">–</span>
                        <span class="text-3xl font-bold tabular-nums"
                              :style="`color: ${teamColor(fx.away_team)}`"
                              x-text="fx.prediction.most_likely_scores[0].away_goals"></span>
                      </div>
                    </template>
                    <template x-if="!fx.prediction?.most_likely_scores?.length && fx.prediction?.expected_goals">
                      <div class="flex items-baseline gap-2 text-slate-500">
                        <span class="text-2xl font-bold tabular-nums"
                              x-text="fx.prediction.expected_goals.home.toFixed(1)"></span>
                        <span class="text-lg font-light">–</span>
                        <span class="text-2xl font-bold tabular-nums"
                              x-text="fx.prediction.expected_goals.away.toFixed(1)"></span>
                      </div>
                    </template>
                    <template x-if="!fx.prediction || fx.prediction.error">
                      <div class="text-[10px] text-rose-500 truncate w-full text-center"
                           x-text="fx.prediction?.error || $t('no_prediction')"></div>
                    </template>
                    <div class="text-[9px] text-slate-400 mt-0.5"
                         x-show="fx.prediction?.probabilities"
                         x-text="$t('draw_short') + ' ' + (fx.prediction.probabilities.draw*100).toFixed(0)+'%'"></div>
                  </div>

                  <!-- Away -->
                  <div class="col-span-2 flex flex-col items-center text-center">
                    <template x-if="fx.away_badge_url && !isBadgeBroken(fx.away_badge_url)">
                      <img :src="fx.away_badge_url" :alt="fx.away_team"
                           @error="markBadgeBroken(fx.away_badge_url)"
                           class="w-11 h-11 object-contain"
                           loading="lazy" />
                    </template>
                    <template x-if="!fx.away_badge_url || isBadgeBroken(fx.away_badge_url)">
                      <div class="w-11 h-11 rounded-full flex items-center justify-center text-white text-sm font-bold shadow"
                           :style="`background-color: ${teamColor(fx.away_team)}`"
                           x-text="teamMonogram(fx.away_team)"></div>
                    </template>
                    <div class="text-[11px] font-semibold mt-1.5 truncate w-full" x-text="fx.away_team"></div>
                    <div class="text-[10px] text-indigo-700 font-semibold mt-0.5"
                         x-show="fx.prediction?.probabilities"
                         x-text="(fx.prediction.probabilities.away_win*100).toFixed(0)+'%'"></div>
                  </div>
                </div>

                <!-- Win bar -->
                <div class="mt-3 flex h-1.5 rounded-full overflow-hidden"
                     x-show="fx.prediction?.probabilities">
                  <div :style="`width: ${fx.prediction.probabilities.home_win*100}%; background-color: ${teamColor(fx.home_team)}`"></div>
                  <div class="bg-slate-300"
                       :style="`width: ${fx.prediction.probabilities.draw*100}%`"></div>
                  <div :style="`width: ${fx.prediction.probabilities.away_win*100}%; background-color: ${teamColor(fx.away_team)}`"></div>
                </div>
              </div>
            </template>
          </div>

          <!-- Skeleton while loading first time -->
          <template x-if="loading.upcoming && !upcomingResult">
            <div class="text-center text-slate-400 text-sm py-12 bg-white rounded-xl border border-slate-200" x-text="$t('upcoming_fetch_first')">
              
            </div>
          </template>

          <template x-if="upcomingResult && featuredFixtures().length === 0">
            <div class="text-center text-slate-400 text-sm py-8 bg-white rounded-xl border border-slate-200">
              <p><span x-text="$t('upcoming_no_pred_a')"></span> <span x-text="upcomingResult.days_ahead"></span> <span x-text="$t('upcoming_no_pred_b')"></span></p>
              <p class="text-[11px] mt-2 text-slate-400" x-text="$t('upcoming_scope_hint')">
                
              </p>
              <button @click="tab='upcoming'" class="text-[11px] mt-2 text-slate-500 hover:text-slate-900 underline">
                <span x-text="$t('view_all_prefix')"></span> <span x-text="upcomingResult.fixture_count"></span> <span x-text="$t('view_all_with_minor')"></span> →
              </button>
            </div>
          </template>

          <div class="flex justify-between items-center text-[11px] text-slate-400 mt-3">
            <span class="italic" x-text="$t('featured_only_note')"></span>
            <button x-show="(upcomingResult?.fixture_count || 0) > featuredFixtures().length"
                    @click="tab='upcoming'"
                    class="text-slate-500 hover:text-slate-900 underline">
              <span x-text="$t('view_all_prefix')"></span> <span x-text="upcomingResult?.fixture_count || 0"></span> <span x-text="$t('matches_unit')"></span> →
            </button>
          </div>
        </div>

      </section>

      <!-- ===== WORLD CUP TAB ===== -->
      <section x-show="tab==='worldcup'" x-cloak>
        <div class="flex flex-wrap items-end justify-between gap-4 mb-6">
          <div>
            <h2 class="text-2xl font-bold" x-text="$t('worldcup_title')"></h2>
            <p class="text-slate-600 text-sm mt-1" x-text="$t('worldcup_subtitle')"></p>
          </div>
          <div class="flex items-end gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1" x-text="$t('worldcup_n_sims')"></label>
              <select x-model.number="wcForm.n_sims" class="rounded-lg border-slate-300 text-sm">
                <option :value="1000" x-text="$t('worldcup_sims_fast')"></option>
                <option :value="5000" x-text="$t('worldcup_sims_default')"></option>
                <option :value="20000" x-text="$t('worldcup_sims_precise')"></option>
              </select>
            </div>
            <button @click="runWorldCup()" :disabled="loading.wc"
                    class="bg-slate-900 text-white rounded-lg px-5 py-2 text-sm font-medium hover:bg-slate-800 disabled:opacity-50">
              <span x-show="!loading.wc" x-text="$t('run')"></span>
              <span x-show="loading.wc" x-text="$t('wc_computing')"></span>
            </button>
          </div>
        </div>

        <p class="text-rose-600 text-sm mb-4" x-show="error.wc" x-text="error.wc"></p>

        <template x-if="wcResult">
          <div class="space-y-6">
            <div class="text-xs text-slate-500">
              <span x-text="wcResult.n_sims.toLocaleString() + ' ' + $t('wc_n_sims_suffix')"></span> ·
              <span x-show="wcResult.from_cache" x-text="$t('wc_from_cache')"></span>
              <span x-show="!wcResult.from_cache" x-text="$t('wc_instant')"></span>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
                  <tr>
                    <th class="text-left px-4 py-2.5">#</th>
                    <th class="text-left px-3 py-2.5" x-text="$t('wc_th_team')"></th>
                    <th class="text-right px-3 py-2.5">Elo</th>
                    <th class="text-right px-3 py-2.5">R16</th>
                    <th class="text-right px-3 py-2.5">QF</th>
                    <th class="text-right px-3 py-2.5">SF</th>
                    <th class="text-right px-3 py-2.5" x-text="$t('wc_th_final')"></th>
                    <th class="text-right px-4 py-2.5" x-text="$t('wc_th_champion')"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(row, i) in wcResult.table" :key="row.team">
                    <tr class="border-t border-slate-100 hover:bg-slate-50">
                      <td class="px-4 py-2 text-slate-400 tabular-nums" x-text="i+1"></td>
                      <td class="px-3 py-2 font-medium" x-text="row.team"></td>
                      <td class="px-3 py-2 text-right tabular-nums text-slate-500" x-text="row.elo.toFixed(0)"></td>
                      <td class="px-3 py-2 text-right tabular-nums" x-text="(row.p_R16*100).toFixed(1)+'%'"></td>
                      <td class="px-3 py-2 text-right tabular-nums" x-text="(row.p_quarters*100).toFixed(1)+'%'"></td>
                      <td class="px-3 py-2 text-right tabular-nums" x-text="(row.p_semis*100).toFixed(1)+'%'"></td>
                      <td class="px-3 py-2 text-right tabular-nums" x-text="(row.p_final*100).toFixed(1)+'%'"></td>
                      <td class="px-4 py-2 text-right tabular-nums font-semibold"

                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
              <div class="text-xs text-slate-500 font-semibold mb-3" x-text="$t('wc_chart_title')"></div>

            </div>
          </div>

          </div>

                  <th class="text-left px-4 py-2.5" x-text="$t('leagues_filter_label')"></th>
                  <th class="text-center px-2 py-2.5" x-text="$t('leagues_tier_label')"></th>

                      <div class="font-medium" x-text="l.name"></div>
                      <div class="text-[11px] text-slate-400">
                        <span x-text="l.country"></span>

                        <span x-text="(coverageFor(l.key)?.match_count ?? 0).toLocaleString()"></span> <span x-text="$t('matches_unit')"></span>

                    </td>
                    <td class="text-center px-4 py-2">
                      <span class="inline-flex items-center rounded-full px-2 py-0.5 text-[11px] font-semibold"

                    </td>
                  </tr>

              </tbody>

              <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center text-slate-400 text-sm" x-text="$t('coverage_pick_left')">
                
              </div>
            </template>
            <template x-if="selectedLeague">
              <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
                  <div>

                      · xG <span x-text="coverageFor(selectedLeague)?.xg_match_rows?.toLocaleString() ?? 0"></span>
                      · <span x-text="$t('latest_label')"></span> <span x-text="coverageFor(selectedLeague)?.latest_match || $t('no_data')"></span>

                    <div class="text-2xl font-bold tabular-nums mt-1" x-text="backtestResult.summary.n_predictions?.toLocaleString()"></div>

                            <th class="text-right px-2 py-2">RPS</th>
                            <th class="text-right px-2 py-2" x-text="$t('audit_th_score')"></th>

                              <td class="px-2 py-1.5 text-right tabular-nums" x-text="r.rps.toFixed(4)"></td>
                              <td class="px-2 py-1.5 text-right tabular-nums"
                                  :class="r.exact_score_accuracy > 0.10 ? 'text-emerald-600' : ''"

                          </template>
                        </tbody>
                      </table>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-2" x-text="$t('bt_by_league_hint')">
                      
                    </p>

                <!-- Fit health: how fresh was the model when each prediction
                     was made? If pct_with_fresh_model is low or skipped_refits
                     is high, the headline accuracy was made on partially-stale
                     models — interpret with caution. -->
                <template x-if="backtestResult.summary.fit_health">
                  <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                    <div class="flex items-center gap-2 mb-3">
                      <h3 class="text-xs text-slate-500 font-semibold uppercase" x-text="$t('bt_fit_health')"></h3>
                      <span class="inline-flex items-center text-[10px] px-2 py-0.5 rounded-full font-medium"
                            :class="(backtestResult.summary.fit_health.skipped_refits || 0) === 0
                                    ? 'bg-emerald-100 text-emerald-700'
                                    : (backtestResult.summary.fit_health.skipped_refits / Math.max(1, backtestResult.summary.fit_health.refit_attempts) > 0.1
                                        ? 'bg-rose-100 text-rose-700'
                                        : 'bg-amber-100 text-amber-700')">
                        <span x-text="(backtestResult.summary.fit_health.skipped_refits || 0) === 0
                                      ? $t('bt_fit_all_ok_label')
                                      : ((backtestResult.summary.fit_health.skipped_refits / Math.max(1, backtestResult.summary.fit_health.refit_attempts) > 0.1)

                                         : $t('bt_fit_few_fail_label'))"></span>
                      </span>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                      <div class="bg-slate-50 rounded-lg p-3">

                        <div class="text-xl font-bold tabular-nums" x-text="backtestResult.summary.fit_health.refit_attempts"></div>
                      </div>
                      <div class="bg-slate-50 rounded-lg p-3">
                        <div class="text-[10px] uppercase tracking-wide text-slate-500" x-text="$t('bt_fit_success')"></div>
                        <div class="text-xl font-bold tabular-nums text-emerald-700"
                             x-text="backtestResult.summary.fit_health.refits_succeeded"></div>
                      </div>
                      <div class="bg-slate-50 rounded-lg p-3">
                        <div class="text-[10px] uppercase tracking-wide text-slate-500" x-text="$t('bt_fit_failures')"></div>
                        <div class="text-xl font-bold tabular-nums"
                             :class="(backtestResult.summary.fit_health.skipped_refits || 0) > 0 ? 'text-rose-700' : 'text-slate-900'"
                             x-text="backtestResult.summary.fit_health.skipped_refits"></div>
                      </div>
                      <div class="bg-slate-50 rounded-lg p-3">
                        <div class="text-[10px] uppercase tracking-wide text-slate-500" x-text="$t('bt_fit_fresh_pct')"></div>
                        <div class="text-xl font-bold tabular-nums"
                             x-text="((backtestResult.summary.fit_health.pct_with_fresh_model || 0)*100).toFixed(0)+'%'"></div>
                        <div class="text-[9px] text-slate-400" x-text="$t('bt_fit_fresh_note')"></div>
                      </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-3 text-[11px] text-slate-600">
                      <div>
                        <span x-text="$t('bt_max_stale') + ':'"></span> <span class="font-semibold tabular-nums"
                                       :class="backtestResult.summary.fit_health.max_model_staleness > 50 ? 'text-rose-700' : 'text-slate-900'"

                        <span x-text="$t('bt_max_stale_hint')"></span>
                      </div>
                      <div>
                        <span x-text="$t('bt_avg_stale') + ':'"></span> <span class="font-semibold tabular-nums"

                        <span x-text="$t('bt_max_stale_unit')"></span>

                    </div>
                    <template x-if="backtestResult.summary.fit_health.failed_refits?.length">
                      <details class="mt-3 text-[11px]">
                        <summary class="text-slate-500 cursor-pointer hover:text-slate-700">
                          <span x-text="$t('bt_fit_failed_pts')"></span>
                          <span x-text="Math.min(backtestResult.summary.fit_health.failed_refits.length, 5)"></span><span x-text="$t('bt_fit_failed_pts_2')"></span>
                        </summary>
                        <div class="mt-2 space-y-1 text-slate-600">
                          <template x-for="f in backtestResult.summary.fit_health.failed_refits.slice(0, 5)" :key="f.match_index">
                            <div>
                              <span class="font-mono" x-text="f.as_of"></span>
                              · <span x-text="$t('bt_train_set')"></span> <span class="tabular-nums" x-text="f.train_size"></span> <span x-text="$t('matches_unit')"></span>
                              · <span class="text-rose-700 text-[10px]" x-text="f.error"></span>
                            </div>
                          </template>
                        </div>
                      </details>
                    </template>
                  </div>
                </template>

                <!-- Realized rates -->
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                  <div class="text-xs text-slate-500 font-semibold mb-3" x-text="$t('bt_real_dist')"></div>
                  <div class="flex h-8 rounded-lg overflow-hidden text-xs font-medium text-white">
                    <div class="bg-emerald-500 flex items-center justify-center"
                         :style="`width: ${backtestResult.summary.home_win_rate*100}%`">
                      <span x-show="backtestResult.summary.home_win_rate > 0.10"
                            x-text="$t('home_win_short') + ' ' + (backtestResult.summary.home_win_rate*100).toFixed(1) + '%'"></span>
                    </div>
                    <div class="bg-slate-400 flex items-center justify-center"
                         :style="`width: ${backtestResult.summary.draw_rate*100}%`">
                      <span x-show="backtestResult.summary.draw_rate > 0.10"
                            x-text="$t('draw_short') + ' ' + (backtestResult.summary.draw_rate*100).toFixed(1) + '%'"></span>
                    </div>
                    <div class="bg-indigo-500 flex items-center justify-center"
                         :style="`width: ${backtestResult.summary.away_win_rate*100}%`">
                      <span x-show="backtestResult.summary.away_win_rate > 0.10"
                            x-text="$t('away_win_short') + ' ' + (backtestResult.summary.away_win_rate*100).toFixed(1) + '%'"></span>
                    </div>
                  </div>
                  <p class="text-[11px] text-slate-400 mt-2">
                    <span x-text="$t('bt_baseline_ref')"></span>
                    <span x-text="(backtestResult.summary.home_win_rate*100).toFixed(1)+'%'"></span><span x-text="$t('bt_market_close')"></span>
                  </p>
                </div>

                <!-- Interpretation -->
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 text-xs text-slate-600">
                  <p class="font-semibold text-slate-700 mb-1" x-text="$t('bt_how_to_read')"></p>
                  <p x-html="$t('bt_how_to_read_html')"></p>
                  <p class="mt-1.5" x-html="$t('bt_xg_note_html')"></p>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>

                <div class="grid grid-cols-3 gap-3">

                    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">

                      <span class="text-slate-300 mx-1">vs</span>
                      <span x-text="inplayResult.away_team"></span>
                    </div>
                    <div>
                      <span class="font-mono" x-text="inplayResult.minute_elapsed + '\''"></span>
                      <span class="text-slate-400">·</span>
                      <span x-text="$t('remaining_word')"></span> <span class="font-mono" x-text="inplayResult.minutes_remaining"></span> <span x-text="$t('minutes_unit')"></span>
                    </div>
                  </div>
                  <div class="flex items-center justify-center gap-6 my-4">

                      <div class="text-5xl font-bold tabular-nums text-emerald-600" x-text="inplayResult.current_score.home"></div>
                      <div class="text-xs text-slate-500 mt-1" x-text="$t('coverage_th_home')"></div>

                    <div class="text-2xl text-slate-300">:</div>

                      <div class="text-5xl font-bold tabular-nums text-indigo-600" x-text="inplayResult.current_score.away"></div>
                      <div class="text-xs text-slate-500 mt-1" x-text="$t('coverage_th_away')"></div>
                    </div>
                  </div>
                </div>

                <!-- Probability bar -->
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                  <div class="flex items-baseline justify-between mb-2">
                    <h3 class="font-semibold text-slate-900 text-sm" x-text="$t('inplay_final_probs')"></h3>
                    <span class="text-xs text-slate-500" x-show="inplayResult.pre_match">
                      <span x-text="$t('pre_match_was')"></span> <span x-text="(inplayResult.pre_match.probabilities.home_win*100).toFixed(0) + '/' + (inplayResult.pre_match.probabilities.draw*100).toFixed(0) + '/' + (inplayResult.pre_match.probabilities.away_win*100).toFixed(0) + '%'"></span>
                    </span>
                  </div>
                  <div class="flex h-9 rounded-lg overflow-hidden text-xs font-medium text-white">
                    <div class="bg-emerald-500 flex items-center justify-center"
                         :style="`width: ${inplayResult.probabilities.home_win*100}%`">
                      <span x-show="inplayResult.probabilities.home_win > 0.06">

                         :style="`width: ${inplayResult.probabilities.draw*100}%`">
                      <span x-show="inplayResult.probabilities.draw > 0.06">

                      </span>
                    </div>
                    <div class="bg-indigo-500 flex items-center justify-center"
                         :style="`width: ${inplayResult.probabilities.away_win*100}%`">
                      <span x-show="inplayResult.probabilities.away_win > 0.06">
                        <span x-text="$t('away_win')"></span> <span x-text="(inplayResult.probabilities.away_win*100).toFixed(1)+'%'"></span>

                        <span class="text-indigo-700" x-text="$t('coverage_th_away')"></span>
                        <span :class="inplayResult.game_state_multipliers.away > 1 ? 'text-emerald-600 font-semibold' : (inplayResult.game_state_multipliers.away < 1 ? 'text-rose-600' : 'text-slate-500')"

                    <div class="text-[11px] text-slate-400 mt-1.5" x-text="$t('inplay_state_legend')">
                      
                    </div>

          <div class="grid lg:grid-cols-3 gap-6">
            <!-- Sortable table (2/3 width) -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
                  <tr>
                    <th class="text-left px-3 py-2">#</th>
                    <th class="text-left px-3 py-2" x-text="$t('wc_th_team')"></th>
                    <th class="text-right px-3 py-2" x-text="$t('str_th_attack')"></th>
                    <th class="text-right px-3 py-2" x-text="$t('str_th_defense')"></th>
                    <th class="text-right px-3 py-2" x-text="$t('str_th_overall')"></th>
                    <th class="text-center px-3 py-2" x-text="$t('str_th_last5')"></th>

                    <th class="text-right px-3 py-2">Elo</th>
