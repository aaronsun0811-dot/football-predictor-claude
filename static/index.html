                      <td class="px-3 py-2 font-medium" x-text="t.team"></td>
                      <td class="px-3 py-2 text-right tabular-nums"
                          :class="t.attack > 0.2 ? 'text-emerald-600 font-semibold' : (t.attack < -0.2 ? 'text-rose-500' : 'text-slate-700')"
                          x-text="(t.attack >= 0 ? '+' : '') + t.attack.toFixed(3)"></td>
                      <td class="px-3 py-2 text-right tabular-nums"
                          :class="t.defense > 0.2 ? 'text-emerald-600 font-semibold' : (t.defense < -0.2 ? 'text-rose-500' : 'text-slate-700')"
                          x-text="(t.defense >= 0 ? '+' : '') + t.defense.toFixed(3)"></td>
                      <td class="px-3 py-2 text-right tabular-nums font-semibold"
                          :class="t.overall > 0.4 ? 'text-emerald-600' : (t.overall < -0.4 ? 'text-rose-600' : 'text-slate-900')"
                          x-text="(t.overall >= 0 ? '+' : '') + t.overall.toFixed(3)"></td>
                      <td class="px-3 py-2 text-center font-mono text-xs tracking-wider"
                          x-html="t.recent_form.split('').map(ch =>
                            ch === 'W' ? '<span class=\'text-emerald-600 font-semibold\'>W</span>' :
                            ch === 'L' ? '<span class=\'text-rose-500\'>L</span>' :
                            '<span class=\'text-slate-400\'>D</span>'
                          ).join('')"></td>
                      <td class="px-3 py-2 text-right tabular-nums"
                          :class="t.recent_gd > 0 ? 'text-emerald-600' : (t.recent_gd < 0 ? 'text-rose-500' : 'text-slate-500')"
                          x-text="(t.recent_gd >= 0 ? '+' : '') + t.recent_gd"></td>
                      <td class="px-3 py-2 text-right tabular-nums text-slate-500"
                          x-text="t.club_elo ? t.club_elo.toFixed(0) : '—'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- Compare panel (1/3 width) -->
            <div class="space-y-4">
              <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                <div class="text-xs font-semibold text-slate-700 mb-2" x-text="$t('strengths_compare')"></div>
                <p class="text-[11px] text-slate-500 mb-3" x-text="$t('str_compare_hint')"></p>
                <template x-if="compareSet.length === 0">
                  <p class="text-xs text-slate-400" x-text="$t('str_compare_none')"></p>
                </template>
                <template x-if="compareSet.length > 0">
                  <div class="space-y-2">
                    <template x-for="name in compareSet" :key="name">
                      <div class="flex items-center gap-2 text-sm">
                        <span class="font-medium" x-text="name"></span>
                        <button @click="toggleCompare(name)" class="ml-auto text-xs text-slate-400 hover:text-rose-500">×</button>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

              <template x-if="compareSet.length === 2">
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                  <div class="text-xs font-semibold text-slate-700 mb-3" x-text="$t('str_compare_panel_h')"></div>
                  <div class="space-y-3 text-sm">
                    <template x-for="dim in ['attack', 'defense', 'overall']" :key="dim">
                      <div>
                        <div class="flex justify-between text-xs text-slate-500 mb-1">
                          <span x-text="dim === 'attack' ? $t('str_sort_attack') : (dim === 'defense' ? $t('str_sort_defense') : $t('str_sort_overall_short'))"></span>
                          <span class="font-mono"
                                x-text="(strengthsByTeam(compareSet[0])?.[dim]?.toFixed(3) ?? '—') + ' vs ' + (strengthsByTeam(compareSet[1])?.[dim]?.toFixed(3) ?? '—')"></span>
                        </div>
                        <div class="flex h-3 rounded overflow-hidden bg-slate-100">
                          <div class="bg-emerald-500"
                               :style="`width: ${barWidth(compareSet[0], dim)}%`"></div>
                          <div class="bg-indigo-500"
                               :style="`width: ${barWidth(compareSet[1], dim)}%`"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                  <div class="text-[11px] text-slate-400 mt-3" x-text="$t('str_compare_legend')"></div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </section>

      <!-- ===== MATCH REPLAY TAB ===== -->
      <section x-show="tab==='replay'" x-cloak>
        <h2 class="text-2xl font-bold mb-1" x-text="$t('tab_replay')"></h2>
        <p class="text-slate-600 mb-6 text-sm" x-html="$t('replay_intro_html')"></p>

        <div class="flex flex-wrap gap-3 mb-5 items-end">
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1" x-text="$t('league')"></label>
            <select x-model="replayForm.league"
                    @change="loadReplayHistory(); replaySurprises = null; replayResult = null"
                    class="rounded-lg border-slate-300 text-sm">
              <template x-for="l in leagues.filter(l => l.tier <= 2)" :key="l.key">
                <option :value="l.key" x-text="l.name + ' · T' + l.tier"></option>
              </template>
            </select>
          </div>
          <button @click="loadSurprises()" :disabled="loading.replaySurprises"
                  class="bg-slate-900 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-slate-800 disabled:opacity-50">
            <span x-show="!loading.replaySurprises" x-text="$t('replay_scan_all')"></span>
            <span x-show="loading.replaySurprises" x-text="$t('replay_scanning')"></span>
          </button>
        </div>

        <p class="text-rose-600 text-sm mb-3" x-show="error.replay" x-text="error.replay"></p>

        <div class="grid lg:grid-cols-3 gap-6">
          <!-- Left: recent matches list -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-4 py-2 bg-slate-50 text-xs font-semibold text-slate-700 uppercase tracking-wider" x-text="$t('replay_recent_30')"></div>
            <div x-show="loading.replayHistory" class="p-6 text-center text-slate-400 text-sm" x-text="$t('health_loading')"></div>
            <table class="w-full text-sm" x-show="!loading.replayHistory && replayHistory.length">
              <tbody>
                <template x-for="m in replayHistory" :key="m.date + m.home_team + m.away_team">
                  <tr @click="runReplay(m)"
                      :class="(replayResult?.home_team === m.home_team && replayResult?.away_team === m.away_team && replayResult?.match_date === m.date) ? 'bg-emerald-50' : 'hover:bg-slate-50'"
                      class="border-t border-slate-100 cursor-pointer text-xs">
                    <td class="px-3 py-2 text-slate-500 tabular-nums" x-text="m.date"></td>
                    <td class="px-2 py-2 text-right font-medium" x-text="m.home_team"></td>
                    <td class="px-2 py-2 text-center tabular-nums font-mono" x-text="m.home_goals + '–' + m.away_goals"></td>
                    <td class="px-2 py-2" x-text="m.away_team"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <!-- Right: replay detail (2/3 width) -->
          <div class="lg:col-span-2 space-y-4">
            <template x-if="!replayResult && !loading.replay">
              <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center text-slate-400 text-sm" x-text="$t('replay_pick_first')"></div>
            </template>
            <template x-if="loading.replay">
              <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center">
                <div class="inline-block w-8 h-8 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin"></div>
                <p class="text-slate-500 text-sm mt-4" x-text="$t('replay_retraining')"></p>
              </div>
            </template>
            <template x-if="replayResult && !loading.replay">
              <div class="space-y-4">
                <!-- Match header + actual score -->
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                  <div class="flex items-baseline justify-between text-xs text-slate-500 mb-3">
                    <div>
                      <span class="font-mono" x-text="replayResult.match_date"></span>
                      <span class="ml-2 text-slate-400" x-text="replayResult.league_key"></span>
                    </div>
                    <div>
                      <span x-text="$t('replay_trained_prefix')"></span> <span class="font-mono" x-text="replayResult.training_rows.toLocaleString()"></span> <span x-text="$t('replay_trained_suffix')"></span>
                    </div>
                  </div>
                  <div class="flex items-center justify-center gap-6 my-4">
                    <div class="text-center">
                      <div class="text-sm text-slate-600" x-text="replayResult.home_team"></div>
                      <div class="text-5xl font-bold tabular-nums" x-text="replayResult.actual.home_goals"></div>
                    </div>
                    <div class="text-3xl text-slate-300">:</div>
                    <div class="text-center">
                      <div class="text-sm text-slate-600" x-text="replayResult.away_team"></div>
                      <div class="text-5xl font-bold tabular-nums" x-text="replayResult.actual.away_goals"></div>
                    </div>
                  </div>
                  <div class="text-center">
                    <span :class="replayResult.prediction.correct ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'"
                          class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold">
                      <span x-show="replayResult.prediction.correct" x-text="'✓ ' + $t('replay_model_correct')"></span>
                      <span x-show="!replayResult.prediction.correct" x-text="'✗ ' + $t('replay_model_wrong')"></span>
                    </span>
                  </div>
                </div>

                <!-- Probability bar with actual outcome highlighted -->
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                  <div class="text-xs text-slate-500 font-semibold mb-3" x-text="$t('replay_pre_match_probs')"></div>
                  <div class="flex h-10 rounded-lg overflow-hidden text-xs font-medium text-white">
                    <div class="bg-emerald-500 flex items-center justify-center"
                         :class="replayResult.actual.outcome === 'home_win' ? 'ring-2 ring-emerald-900 ring-inset' : ''"
                         :style="`width: ${replayResult.prediction.home_win*100}%`">
                      <span x-show="replayResult.prediction.home_win > 0.06">
                        <span x-text="$t('home_win')"></span> <span x-text="(replayResult.prediction.home_win*100).toFixed(1)+'%'"></span>
                      </span>
                    </div>
                    <div class="bg-slate-400 flex items-center justify-center"
                         :class="replayResult.actual.outcome === 'draw' ? 'ring-2 ring-slate-900 ring-inset' : ''"
                         :style="`width: ${replayResult.prediction.draw*100}%`">
                      <span x-show="replayResult.prediction.draw > 0.06">
                        <span x-text="$t('draw')"></span> <span x-text="(replayResult.prediction.draw*100).toFixed(1)+'%'"></span>
                      </span>
                    </div>
                    <div class="bg-indigo-500 flex items-center justify-center"
                         :class="replayResult.actual.outcome === 'away_win' ? 'ring-2 ring-indigo-900 ring-inset' : ''"
                         :style="`width: ${replayResult.prediction.away_win*100}%`">
                      <span x-show="replayResult.prediction.away_win > 0.06">
                        <span x-text="$t('away_win')"></span> <span x-text="(replayResult.prediction.away_win*100).toFixed(1)+'%'"></span>
                      </span>
                    </div>
                  </div>
                </div>

                <!-- Scoring metrics -->
                <div class="grid grid-cols-3 gap-3">
                  <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                    <div class="text-[11px] text-slate-500 font-semibold uppercase">Log loss</div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         :class="replayResult.scores.log_loss < 0.5 ? 'text-emerald-600' : (replayResult.scores.log_loss < 1.2 ? 'text-slate-900' : 'text-rose-600')"
                         x-text="replayResult.scores.log_loss.toFixed(3)"></div>
                    <div class="text-[10px] text-slate-400" x-text="$t('lower_better')"></div>
                  </div>
                  <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                    <div class="text-[11px] text-slate-500 font-semibold uppercase">RPS</div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         :class="replayResult.scores.rps < 0.10 ? 'text-emerald-600' : (replayResult.scores.rps < 0.25 ? 'text-slate-900' : 'text-rose-600')"
                         x-text="replayResult.scores.rps.toFixed(3)"></div>
                  </div>
                  <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                    <div class="text-[11px] text-slate-500 font-semibold uppercase">Brier</div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         x-text="replayResult.scores.brier.toFixed(3)"></div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Surprises section (full width below) -->
        <template x-if="replaySurprises">
          <div class="grid lg:grid-cols-2 gap-6 mt-8">
            <!-- Biggest upsets -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div class="px-4 py-3 bg-rose-50 border-b border-rose-100">
                <div class="text-xs font-semibold text-rose-800 uppercase tracking-wider" x-text="$t('replay_biggest_upsets_h')"></div>
                <div class="text-[11px] text-rose-700/70 mt-0.5" x-text="$t('replay_biggest_upsets_sub')"></div>
              </div>
              <table class="w-full text-xs">
                <tbody>
                  <template x-for="m in replaySurprises.biggest_upsets" :key="m.match_date + m.home_team">
                    <tr @click="runReplay({date: m.match_date, home_team: m.home_team, away_team: m.away_team, home_goals: 0, away_goals: 0})"
                        class="border-t border-slate-100 cursor-pointer hover:bg-slate-50">
                      <td class="px-3 py-2 text-slate-500 tabular-nums" x-text="m.match_date"></td>
                      <td class="px-2 py-2 text-right font-medium" x-text="m.home_team"></td>
                      <td class="px-2 py-2 text-center tabular-nums font-mono" x-text="m.actual_score"></td>
                      <td class="px-2 py-2" x-text="m.away_team"></td>
                      <td class="px-3 py-2 text-right tabular-nums text-rose-700 font-semibold"
                          x-text="(m.p_actual*100).toFixed(1) + '%'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- Best calls -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div class="px-4 py-3 bg-emerald-50 border-b border-emerald-100">
                <div class="text-xs font-semibold text-emerald-800 uppercase tracking-wider" x-text="$t('replay_best_calls_h')"></div>
                <div class="text-[11px] text-emerald-700/70 mt-0.5" x-text="$t('replay_best_calls_sub')"></div>
              </div>
              <table class="w-full text-xs">
                <tbody>
                  <template x-for="m in replaySurprises.best_calls" :key="m.match_date + m.home_team">
                    <tr @click="runReplay({date: m.match_date, home_team: m.home_team, away_team: m.away_team, home_goals: 0, away_goals: 0})"
                        class="border-t border-slate-100 cursor-pointer hover:bg-slate-50">
                      <td class="px-3 py-2 text-slate-500 tabular-nums" x-text="m.match_date"></td>
                      <td class="px-2 py-2 text-right font-medium" x-text="m.home_team"></td>
                      <td class="px-2 py-2 text-center tabular-nums font-mono" x-text="m.actual_score"></td>
                      <td class="px-2 py-2" x-text="m.away_team"></td>
                      <td class="px-3 py-2 text-right tabular-nums text-emerald-700 font-semibold"
                          x-text="(m.p_actual*100).toFixed(1) + '%'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </section>

      <!-- ===== UPCOMING TAB ===== -->
      <section x-show="tab==='upcoming'" x-cloak>
        <h2 class="text-2xl font-bold mb-1" x-text="$t('upcoming_title')"></h2>
        <p class="text-slate-600 mb-6 text-sm" x-text="$t('upcoming_subtitle')"></p>

        <div class="flex flex-wrap gap-3 mb-5 items-end">
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1" x-text="$t('days_ahead_label')"></label>
            <select x-model.number="upcomingForm.days_ahead" @change="loadUpcoming()" class="rounded-lg border-slate-300 text-sm">
              <option :value="3" x-text="$t('days_today_plus_3')"></option>
              <option :value="7" x-text="$t('days_next_7')"></option>
              <option :value="14" x-text="$t('days_next_14')"></option>
              <option :value="30" x-text="$t('days_next_30')"></option>
            </select>
          </div>
          <button @click="loadUpcoming(true)" :disabled="loading.upcoming"
                  class="bg-slate-900 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-slate-800 disabled:opacity-50">
            <span x-show="!loading.upcoming" x-text="$t('refresh')"></span>
            <span x-show="loading.upcoming" x-text="$t('upcoming_loading')"></span>
          </button>
          <span class="ml-auto text-xs text-slate-500" x-show="upcomingResult">
            <span x-text="upcomingResult?.fixture_count + ' ' + $t('fixtures_count_suffix')"></span>
          </span>
        </div>

        <p class="text-rose-600 text-sm mb-3" x-show="error.upcoming" x-text="error.upcoming"></p>

        <template x-if="loading.upcoming">
          <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center">
            <div class="inline-block w-8 h-8 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin"></div>
            <p class="text-slate-500 text-sm mt-4" x-text="$t('upcoming_loading_detail')"></p>
          </div>
        </template>

        <template x-if="!loading.upcoming && !upcomingResult && !error.upcoming">
          <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center text-slate-400 text-sm">
            <p x-text="$t('upcoming_not_loaded')"></p>
            <button @click="loadUpcoming(true)" class="mt-3 bg-slate-900 text-white rounded-lg px-4 py-1.5 text-sm font-medium hover:bg-slate-800"
                    x-text="$t('upcoming_load_now')"></button>
          </div>
        </template>

        <template x-if="upcomingResult && upcomingResult.fixture_count === 0">
          <div class="bg-white rounded-xl p-12 shadow-sm border border-slate-200 text-center text-slate-400 text-sm">
            <p>
              <span x-text="$t('upcoming_empty_prefix')"></span>
              <span x-text="upcomingForm.days_ahead"></span>
              <span x-text="$t('upcoming_empty_suffix')"></span>
            </p>
            <p class="mt-2 text-[11px]" x-text="$t('upcoming_empty_hint')"></p>
            <button @click="upcomingForm.days_ahead = 30; loadUpcoming(true)"
                    class="mt-3 text-xs text-slate-500 underline hover:text-slate-900"
                    x-text="$t('upcoming_try_30')"></button>
          </div>
        </template>

        <template x-if="upcomingResult && upcomingResult.fixture_count > 0">
          <!-- 2-column matchup-card grid, same visual language as the homepage
               fixture board. Each card carries the full prediction detail
               (xG / Δvs3h / top scores / totals / BTTS) below the matchup row,
               so power users see all the numbers — but the headline view
               (badges + score + probability bar) matches the homepage. -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
            <template x-for="fx in upcomingResult.fixtures" :key="fx.date + fx.home_team + fx.away_team">
              <div class="bg-gradient-to-br from-slate-50 to-white rounded-xl p-4 shadow-sm border border-slate-200 hover:shadow-md transition">
                <!-- Header -->
                <div class="flex items-center justify-between text-[10px] text-slate-500 mb-2">
                  <div class="flex items-center gap-1.5 flex-wrap">
                    <span class="font-mono" x-text="fx.date"></span>
                    <span x-show="fx.time_utc" x-text="fx.time_utc + ' UTC'"></span>
                    <span class="px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 font-medium" x-text="fx.league_key"></span>
                    <template x-if="fx.date_check && fx.date_check.status === 'warning'">
                      <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md
                                   bg-amber-100 text-amber-800 text-[9px] font-semibold"
                            :title="$t('date_warn_title_prefix') + ' ' + fx.date_check.fdorg_date">
                        📅 <span x-text="'(' + (fx.date_check.days_off > 0 ? '+' : '') + fx.date_check.days_off + 'd)'"></span>
                      </span>
                    </template>
                    <template x-if="fx.date_check && fx.date_check.status === 'confirmed'">
                      <span class="inline-flex items-center px-1.5 py-0.5 rounded-md
                                   bg-emerald-50 text-emerald-700 text-[9px]"
                            :title="$t('date_confirmed_title')">
                        ✓
                      </span>
                    </template>
                  </div>
                  <div x-show="fx.venue" class="text-slate-400 truncate" x-text="fx.venue"></div>
                </div>

                <!-- Matchup body -->
                <div class="grid grid-cols-7 items-center gap-2">
                  <!-- Home -->
                  <div class="col-span-2 flex flex-col items-center text-center">
                    <template x-if="fx.home_badge_url && !isBadgeBroken(fx.home_badge_url)">
                      <img :src="fx.home_badge_url" :alt="fx.home_team"
                           @error="markBadgeBroken(fx.home_badge_url)"
                           class="w-11 h-11 object-contain" loading="lazy" />
                    </template>
                    <template x-if="!fx.home_badge_url || isBadgeBroken(fx.home_badge_url)">
                      <div class="w-11 h-11 rounded-full flex items-center justify-center text-white text-sm font-bold shadow"
                           :style="`background-color: ${teamColor(fx.home_team)}`"
                           x-text="teamMonogram(fx.home_team)"></div>
                    </template>
                    <div class="text-[11px] font-semibold mt-1.5 truncate w-full" x-text="fx.home_team"></div>
                    <div class="text-[10px] text-emerald-700 font-semibold mt-0.5"
                         x-show="fx.prediction?.probabilities"
                         x-text="(fx.prediction.probabilities.home_win*100).toFixed(0)+'%'"></div>
                  </div>

                  <!-- Center: score / draw% -->
                  <div class="col-span-3 flex flex-col items-center">
                    <template x-if="fx.prediction?.most_likely_scores?.length">
                      <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold tabular-nums"
                              :style="`color: ${teamColor(fx.home_team)}`"
                              x-text="fx.prediction.most_likely_scores[0].home_goals"></span>
                        <span class="text-xl text-slate-300 font-light">–</span>
                        <span class="text-3xl font-bold tabular-nums"
                              :style="`color: ${teamColor(fx.away_team)}`"
                              x-text="fx.prediction.most_likely_scores[0].away_goals"></span>
                      </div>
                    </template>
                    <template x-if="!fx.prediction?.most_likely_scores?.length && fx.prediction?.expected_goals">
                      <div class="flex items-baseline gap-2 text-slate-500">
                        <span class="text-2xl font-bold tabular-nums"
                              x-text="fx.prediction.expected_goals.home.toFixed(1)"></span>
                        <span class="text-lg font-light">–</span>
                        <span class="text-2xl font-bold tabular-nums"
                              x-text="fx.prediction.expected_goals.away.toFixed(1)"></span>
                      </div>
                    </template>
                    <template x-if="fx.prediction?.error">
                      <div class="text-[10px] text-rose-500 truncate w-full text-center"
                           x-text="fx.prediction.error"></div>
                    </template>
                    <div class="text-[9px] text-slate-400 mt-0.5"
                         x-show="fx.prediction?.probabilities"
                         x-text="$t('draw_short') + ' ' + (fx.prediction.probabilities.draw*100).toFixed(0)+'%'"></div>
                  </div>

                  <!-- Away -->
                  <div class="col-span-2 flex flex-col items-center text-center">
                    <template x-if="fx.away_badge_url && !isBadgeBroken(fx.away_badge_url)">
                      <img :src="fx.away_badge_url" :alt="fx.away_team"
                           @error="markBadgeBroken(fx.away_badge_url)"
                           class="w-11 h-11 object-contain" loading="lazy" />
                    </template>
                    <template x-if="!fx.away_badge_url || isBadgeBroken(fx.away_badge_url)">
                      <div class="w-11 h-11 rounded-full flex items-center justify-center text-white text-sm font-bold shadow"
                           :style="`background-color: ${teamColor(fx.away_team)}`"
                           x-text="teamMonogram(fx.away_team)"></div>
                    </template>
                    <div class="text-[11px] font-semibold mt-1.5 truncate w-full" x-text="fx.away_team"></div>
                    <div class="text-[10px] text-indigo-700 font-semibold mt-0.5"
                         x-show="fx.prediction?.probabilities"

                      </div>

            </template>

                        <div class="overflow-x-auto">
                          <table class="w-full text-sm">
                            <thead class="bg-slate-50 text-[10px] text-slate-500 uppercase">

                              <template x-for="r in healthResult.audit.by_league" :key="r.league_key">

                    <details class="border-t border-slate-100 p-4"
                             @toggle="$el.open && !auditVsBacktest && loadAuditVsBacktest()">
                      <summary class="cursor-pointer text-xs font-semibold text-slate-700 hover:text-slate-900">
                        <span x-text="$t('avb_compare_h')"></span>
                      </summary>
                      <template x-if="auditVsBacktestLoading">

                      </template>
                      <template x-if="auditVsBacktestError">
                        <p class="text-xs text-rose-600 mt-2" x-text="$t('load_failed') + ': ' + auditVsBacktestError"></p>
                      </template>
                      <template x-if="auditVsBacktest && !auditVsBacktestLoading">
                        <div class="mt-3 space-y-2">
                          <div class="text-[11px] text-slate-500">
                            <span x-text="$t('avb_compared_prefix')"></span> <span x-text="auditVsBacktest.n_leagues_compared"></span> <span x-text="$t('avb_compared_suffix')"></span>
                            <span x-show="auditVsBacktest.n_leagues_skipped > 0">
                              · <span x-text="$t('avb_skipped_prefix')"></span> <span x-text="auditVsBacktest.n_leagues_skipped"></span> (<span x-text="$t('avb_skipped_reason')"></span>)
                            </span>
                            <button @click="loadAuditVsBacktest(true)" class="ml-3 text-slate-400 hover:text-slate-700 underline" x-text="$t('refresh')">
                              
                            </button>
                          </div>
                          <template x-if="(auditVsBacktest.rows?.length || 0) > 0">
                            <div class="overflow-x-auto">
                              <table class="w-full text-[12px]">
                                <thead class="bg-slate-50 text-[10px] text-slate-500 uppercase">
                                  <tr>
                                    <th class="text-left px-2 py-1.5" rowspan="2" x-text="$t('health_leagues_card')"></th>
                                    <th class="text-center px-2 py-1.5 border-b border-slate-200" colspan="3" x-text="$t('avb_th_audit')"></th>
                                    <th class="text-center px-2 py-1.5 border-b border-slate-200" colspan="3" x-text="$t('avb_th_backtest')"></th>
                                    <th class="text-center px-2 py-1.5 border-b border-slate-200" colspan="2">Δ (BT−Audit)</th>
                                  </tr>
                                  <tr class="bg-slate-50/60">
                                    <th class="text-right px-1 py-1">N</th>
                                    <th class="text-right px-1 py-1" x-text="$t('roi_win_rate')"></th>
                                    <th class="text-right px-2 py-1">Brier</th>
                                    <th class="text-right px-1 py-1">N</th>
                                    <th class="text-right px-1 py-1" x-text="$t('roi_win_rate')"></th>
                                    <th class="text-right px-2 py-1">Brier</th>
                                    <th class="text-right px-1 py-1" x-text="$t('roi_win_rate')"></th>
                                    <th class="text-right px-2 py-1">Brier</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  <template x-for="r in auditVsBacktest.rows" :key="r.league_key">
                                    <tr class="border-t border-slate-100">
                                      <td class="px-2 py-1 font-medium" x-text="r.league_key"></td>
                                      <td class="px-1 py-1 text-right tabular-nums" x-text="r.audit.n"></td>
                                      <td class="px-1 py-1 text-right tabular-nums"
                                          x-text="r.audit.accuracy !== null ? (r.audit.accuracy*100).toFixed(1)+'%' : '—'"></td>
                                      <td class="px-2 py-1 text-right tabular-nums"
                                          x-text="r.audit.brier !== null ? r.audit.brier.toFixed(3) : '—'"></td>
                                      <td class="px-1 py-1 text-right tabular-nums text-slate-500"
                                          x-text="r.backtest.n.toLocaleString()"></td>
                                      <td class="px-1 py-1 text-right tabular-nums"
                                          x-text="r.backtest.accuracy !== null ? (r.backtest.accuracy*100).toFixed(1)+'%' : '—'"></td>
                                      <td class="px-2 py-1 text-right tabular-nums"
                                          x-text="r.backtest.brier !== null ? r.backtest.brier.toFixed(3) : '—'"></td>
                                      <!-- Δ accuracy: positive = backtest better = data drift suspect -->
                                      <td class="px-1 py-1 text-right tabular-nums font-semibold"
                                          :class="r.delta.accuracy === null ? 'text-slate-300'
                                                  : (r.delta.accuracy > 0.05 ? 'text-amber-700'
                                                     : (r.delta.accuracy < -0.05 ? 'text-emerald-700' : 'text-slate-600'))"
                                          x-text="r.delta.accuracy !== null
                                                  ? (r.delta.accuracy > 0 ? '+' : '') + (r.delta.accuracy*100).toFixed(1) + 'pp'
                                                  : '—'"></td>
                                      <!-- Δ brier: negative = backtest better (lower=better) -->
                                      <td class="px-2 py-1 text-right tabular-nums font-semibold"
                                          :class="r.delta.brier === null ? 'text-slate-300'
                                                  : (r.delta.brier < -0.02 ? 'text-amber-700'
                                                     : (r.delta.brier > 0.02 ? 'text-emerald-700' : 'text-slate-600'))"
                                          x-text="r.delta.brier !== null
                                                  ? (r.delta.brier > 0 ? '+' : '') + r.delta.brier.toFixed(3)
                                                  : '—'"></td>
                                    </tr>
                                  </template>
                                </tbody>
                              </table>
                              <p class="text-[10px] text-slate-400 mt-2" x-html="$t('avb_delta_legend_html')"></p>
                            </div>
                          </template>
                          <template x-if="!auditVsBacktest.rows || auditVsBacktest.rows.length === 0">
                            <p class="text-xs text-slate-400 mt-2" x-html="$t('avb_empty_html')"></p>
                          </template>
                        </div>
                      </template>
                    </details>

                    <div class="grid md:grid-cols-2 gap-4 p-4 border-t border-slate-100">
                      <div>
                        <div class="text-xs font-semibold text-emerald-700 mb-2" x-text="$t('audit_best_calls_h')"></div>
                        <div class="space-y-1 text-xs">
                          <template x-for="b in healthResult.audit.best_calls" :key="b.match_date + b.home_team">
                            <div class="flex items-start gap-2">
                              <span class="text-slate-400 tabular-nums" x-text="b.match_date"></span>
                              <div class="flex-1 min-w-0">
                                <div class="font-medium truncate">
                                  <span x-text="b.home_team"></span>
                                  <span class="text-slate-400 mx-1" x-text="b.actual_score"></span>
                                  <span x-text="b.away_team"></span>
                                </div>
                                <template x-if="b.predicted_score">
                                  <div class="text-[10px] text-slate-500">
                                    <span x-text="$t('audit_pred_label')"></span>
                                    <span :class="b.exact_score_correct ? 'text-emerald-600 font-semibold' : ''"
                                          x-text="b.predicted_score"></span>
                                    <template x-if="b.exact_score_correct">
                                      <span class="ml-1 text-emerald-600" x-text="$t('audit_score_matched')"></span>
                                    </template>
                                    <template x-if="!b.exact_score_correct && b.goal_distance !== null && b.goal_distance !== undefined">
                                      <span class="ml-1 text-slate-400"><span x-text="$t('diff_prefix')"></span> <span x-text="b.goal_distance"></span> <span x-text="$t('balls_unit')"></span></span>
                                    </template>
                                  </div>
                                </template>
                              </div>
                              <span class="tabular-nums text-emerald-700 font-semibold" x-text="(b.p_predicted_outcome*100).toFixed(0)+'%'"></span>
                            </div>
                          </template>
                          <p x-show="!healthResult.audit.best_calls?.length" class="text-slate-400" x-text="$t('audit_none_yet')"></p>
                        </div>
                      </div>
                      <div>
                        <div class="text-xs font-semibold text-rose-700 mb-2" x-text="$t('audit_worst_misses_h')"></div>
                        <div class="space-y-1 text-xs">
                          <template x-for="b in healthResult.audit.worst_misses" :key="b.match_date + b.home_team">
                            <div class="flex items-start gap-2">
                              <span class="text-slate-400 tabular-nums" x-text="b.match_date"></span>
                              <div class="flex-1 min-w-0">
                                <div class="font-medium truncate flex items-center gap-1">
                                  <span x-text="b.home_team"></span>
                                  <span class="text-slate-400 mx-1" x-text="b.actual_score"></span>
                                  <span x-text="b.away_team"></span>
                                  <!-- Date-warning chip — this loss wasn't really the model's fault. -->
                                  <template x-if="b.had_date_warning">
                                    <span class="inline-flex items-center px-1 py-0.5 rounded
                                                 bg-amber-100 text-amber-800 text-[9px] font-semibold"
                                          :title="$t('audit_date_warn_tooltip')">
                                      📅
                                    </span>
                                  </template>
                                </div>
                                <template x-if="b.predicted_score">
                                  <div class="text-[10px] text-slate-500">
                                    <span x-text="$t('predicted_label')"></span> <span class="text-rose-600" x-text="b.predicted_score"></span>
                                    <span class="ml-1 text-slate-400"><span x-text="$t('diff_prefix')"></span> <span x-text="b.goal_distance"></span> <span x-text="$t('balls_unit')"></span></span>
                                  </div>
                                </template>
                              </div>
                              <span class="tabular-nums text-rose-700 font-semibold" x-text="(b.p_actual*100).toFixed(0)+'%'"></span>
                            </div>
                          </template>
                          <p x-show="!healthResult.audit.worst_misses?.length" class="text-slate-400" x-text="$t('audit_none_yet')"></p>
                        </div>
                      </div>
                    </div>

                    <!-- Exact-score hits — when the model nailed not just the
                         outcome but the actual final score. Rare (8-12% by design),
                         so each entry is a small celebration. -->
                    <!-- Unmatched-fixture diagnostic. When audit can't resolve
                         a prediction, show WHY — name mismatch (fix with alias),
                         date mismatch (TSDB stale), or just no data. -->
                    <template x-if="healthResult.audit.unmatched && healthResult.audit.unmatched.n_unmatched > 0">
                      <div class="p-4 border-t border-slate-100 bg-amber-50/30">
                        <div class="text-xs font-semibold text-amber-800 mb-2">
                          ⚠ <span x-text="$t('unmatched_warn_a')"></span> <span x-text="healthResult.audit.unmatched.n_unmatched"></span> <span x-text="$t('unmatched_warn_b')"></span>
                          (<span x-text="$t('unmatched_warn_c')"></span> <span x-text="healthResult.audit.unmatched.n_matched"></span> <span x-text="$t('unmatched_warn_d')"></span>)
                        </div>
                        <div class="text-[11px] text-slate-600 mb-2 space-y-0.5">
                          <template x-for="(n, reason) in (healthResult.audit.unmatched.by_reason || {})" :key="reason">
                            <div class="flex items-center gap-2">
                              <span class="tabular-nums text-amber-700 font-semibold w-6 text-right" x-text="n"></span>
                              <span x-text="
                                reason === 'likely_date_mismatch' ? $t('audit_reason_date_mismatch')
                                : reason === 'no_db_matches_on_date' ? $t('audit_reason_no_db')
                                : reason === 'name_mismatch' ? $t('audit_reason_name')
                                : reason === 'no_close_match' ? $t('audit_reason_no_close')
                                : reason
                              "></span>
                            </div>
                          </template>
                        </div>
                        <details class="mt-2">
                          <summary class="text-[11px] text-slate-500 cursor-pointer hover:text-slate-700">
                            <span x-text="$t('audit_first_5_samples')"></span>
                          </summary>
                          <div class="mt-2 space-y-2 text-[11px]">
                            <template x-for="u in (healthResult.audit.unmatched.sample || [])" :key="u.date + u.canon_home">
                              <div class="border-l-2 pl-2 border-amber-200">
                                <div class="font-mono text-slate-600">
                                  <span x-text="u.date"></span> · <span x-text="u.league_key"></span> ·
                                  <span x-text="u.canon_home"></span> vs <span x-text="u.canon_away"></span>
                                </div>
                                <template x-if="u.nearby_match">
                                  <div class="text-slate-500 mt-0.5">
                                    <span class="text-amber-700" x-text="$t('audit_actual_at')"></span>
                                    <span class="font-mono" x-text="u.nearby_match.ds"></span>
                                    (<span x-text="$t('diff_prefix')"></span> <span x-text="u.nearby_match.days_off"></span> <span x-text="$t('days_unit')"></span><span x-show="u.nearby_match.flipped">, <span x-text="$t('venues_flipped')"></span></span>):
                                    <span x-text="u.nearby_match.home_team"></span> vs <span x-text="u.nearby_match.away_team"></span>
                                  </div>
                                </template>
                                <template x-if="!u.nearby_match && u.candidates && u.candidates.length">
                                  <div class="text-slate-500 mt-0.5">
                                    <template x-for="c in u.candidates.slice(0, 1)" :key="c.home_team">
                                      <span>
                                        <span x-text="$t('nearby_candidate_label')"></span>: <span x-text="c.home_team"></span> vs <span x-text="c.away_team"></span>
                                        <span x-show="c.suggested_alias" class="ml-1 text-emerald-700"
                                              x-text="$t('suggested_alias') + ': ' + c.suggested_alias"></span>
                                      </span>
                                    </template>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </details>
                      </div>
                    </template>

                    <template x-if="healthResult.audit.exact_score_hits?.length">
                      <div class="p-4 border-t border-slate-100 bg-emerald-50/30">
                        <div class="text-xs font-semibold text-emerald-700 mb-2" x-text="$t('audit_exact_score_h')"></div>
                        <div class="space-y-1 text-xs">
                          <template x-for="b in healthResult.audit.exact_score_hits" :key="b.match_date + b.home_team">
                            <div class="flex items-center gap-2">
                              <span class="text-slate-400 tabular-nums" x-text="b.match_date"></span>
                              <span class="text-slate-400" x-text="b.league_key"></span>
                              <span class="font-medium">
                                <span x-text="b.home_team"></span>
                                <span class="text-emerald-700 font-bold mx-1" x-text="b.actual_score"></span>
                                <span x-text="b.away_team"></span>
                              </span>
                              <span class="ml-auto text-[10px] text-slate-500">
                                <span x-text="$t('audit_model_prob_for_score')"></span>
                                <span class="text-emerald-700 font-semibold tabular-nums"
                                      x-text="b.predicted_score_prob ? (b.predicted_score_prob*100).toFixed(1)+'%' : '—'"></span>
                              </span>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <!-- Last backfill run: shows when the daily cron last fired
                 and what it did. Empty until the first run is recorded. -->
            <template x-if="healthResult.last_backfill && healthResult.last_backfill.totals">
              <div class="bg-white rounded-xl border border-slate-200 p-5">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="text-lg font-semibold" x-text="$t('backfill_recent_h')"></h3>
                  <span class="text-[12px] text-slate-500"
                        x-text="$t('backfill_window') + ' ' + healthResult.last_backfill.window?.from + ' → ' + healthResult.last_backfill.window?.to"></span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                  <div class="bg-slate-50 rounded-lg p-3">
                    <div class="text-[11px] uppercase tracking-wide text-slate-500" x-text="$t('backfill_leagues_reached')"></div>
                    <div class="text-2xl font-bold tabular-nums mt-1" x-text="healthResult.last_backfill.totals.leagues_reached"></div>
                  </div>
                  <div class="bg-slate-50 rounded-lg p-3">
                    <div class="text-[11px] uppercase tracking-wide text-slate-500" x-text="$t('backfill_new_matches')"></div>
                    <div class="text-2xl font-bold tabular-nums mt-1 text-emerald-700" x-text="healthResult.last_backfill.totals.inserted"></div>
                  </div>
                  <div class="bg-slate-50 rounded-lg p-3">
                    <div class="text-[11px] uppercase tracking-wide text-slate-500" x-text="$t('backfill_errors')"></div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         :class="healthResult.last_backfill.totals.errors > 0 ? 'text-rose-700' : 'text-slate-900'"
                         x-text="healthResult.last_backfill.totals.errors"></div>
                  </div>
                  <div class="bg-slate-50 rounded-lg p-3">
                    <div class="text-[11px] uppercase tracking-wide text-slate-500" x-text="$t('backfill_duration')"></div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         x-text="(healthResult.last_backfill.duration_s ?? 0).toFixed(1) + 's'"></div>
                  </div>
                </div>

                <details class="text-[12px] text-slate-600">
                  <summary class="cursor-pointer hover:text-slate-900 mb-2">
                    <span x-text="$t('backfill_league_details')"></span>
                    <span x-text="healthResult.last_backfill.league_rows?.length || 0"></span>
                    /<span x-text="healthResult.last_backfill.total_league_rows || 0"></span>
                    <span x-text="$t('backfill_no_source_collapsed')"></span>)
                  </summary>
                  <div class="mt-2 overflow-x-auto">
                    <table class="w-full text-[12px]">
                      <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b">
                        <th class="py-1.5 pr-2" x-text="$t('health_leagues_card')"></th><th class="pr-2" x-text="$t('health_th_source')"></th><th class="pr-2 text-right">入库</th><th class="pr-2 text-right">拉取</th><th>错误</th>
                      </tr></thead>
                      <tbody>
                        <template x-for="r in healthResult.last_backfill.league_rows" :key="r.league_key + '|' + (r.source || '')">
                          <tr class="border-b last:border-0">
                            <td class="py-1 pr-2 font-mono" x-text="r.league_key"></td>
                            <td class="pr-2 text-slate-500" x-text="r.source || '—'"></td>
                            <td class="pr-2 text-right tabular-nums"
                                :class="r.inserted > 0 ? 'text-emerald-700 font-semibold' : 'text-slate-400'"
                                x-text="r.inserted"></td>
                            <td class="pr-2 text-right tabular-nums text-slate-500" x-text="r.fetched ?? '—'"></td>
                            <td class="text-rose-700 text-[11px] truncate max-w-[280px]"
                                x-text="r.error || ''"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </details>
                <div class="text-[11px] text-slate-400 text-right mt-2">
                  <span x-text="$t('backfill_done_at')"></span>: <span class="font-mono" x-text="healthResult.last_backfill.finished_at"></span>
                </div>
              </div>
            </template>

            <!-- Cross-source overlap / conflict scan -->
            <template x-if="healthResult.overlaps">
              <div class="bg-white rounded-xl border border-slate-200 p-5">
                <div class="flex items-center gap-2 mb-3">
                  <h3 class="text-lg font-semibold" x-text="$t('source_consistency_h')"></h3>
                  <!-- Status dot: green=0 conflicts, amber=overlaps without conflict, red=score conflicts -->
                  <span class="inline-flex items-center text-[11px] px-2 py-0.5 rounded-full font-medium"
                        :class="healthResult.overlaps.score_conflict_count > 0
                                ? 'bg-rose-100 text-rose-700'
                                : (healthResult.overlaps.overlap_count > 0
                                    ? 'bg-amber-100 text-amber-700'
                                    : 'bg-emerald-100 text-emerald-700')">
                    <span x-text="healthResult.overlaps.score_conflict_count > 0
                                  ? $t('source_status_conflict')
                                  : (healthResult.overlaps.overlap_count > 0
                                      ? $t('source_status_overlap')
                                      : $t('source_status_ok'))"></span>
                  </span>
                </div>
                <p class="text-[12px] text-slate-500 mb-3">
                  <span x-text="$t('source_consistency_intro')"></span>
                  <span x-html="$t('source_consistency_intro2')"></span>
                </p>
                <div class="grid grid-cols-2 gap-3 mb-3">
                  <div class="bg-slate-50 rounded-lg p-3">
                    <div class="text-[11px] uppercase tracking-wide text-slate-500" x-text="$t('source_cross_coverage')"></div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         :class="healthResult.overlaps.overlap_count > 0 ? 'text-amber-700' : 'text-slate-900'"
                         x-text="healthResult.overlaps.overlap_count"></div>
                  </div>
                  <div class="bg-slate-50 rounded-lg p-3">
                    <div class="text-[11px] uppercase tracking-wide text-slate-500" x-text="$t('source_score_conflicts')"></div>
                    <div class="text-2xl font-bold tabular-nums mt-1"
                         :class="healthResult.overlaps.score_conflict_count > 0 ? 'text-rose-700' : 'text-slate-900'"
                         x-text="healthResult.overlaps.score_conflict_count"></div>
                  </div>
                </div>

                <template x-if="healthResult.overlaps.top_conflicts?.length">
                  <div class="mb-3">
                    <h4 class="font-medium text-sm mb-2 text-rose-700" x-text="$t('source_conflicts_h')"></h4>
                    <div class="overflow-x-auto">
                      <table class="w-full text-sm">
                        <thead><tr class="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b">
                          <th class="py-1.5" x-text="$t('coverage_th_date')"></th><th>比赛</th><th>各源比分</th>
                          <th class="text-right" x-text="$t('source_th_chosen')"></th>
                        </tr></thead>
                        <tbody>
                          <template x-for="c in healthResult.overlaps.top_conflicts" :key="c.key">
                            <tr class="border-b last:border-0 hover:bg-slate-50">
                              <td class="py-1.5 font-mono text-[12px]" x-text="c.date"></td>
                              <td class="text-[12px]">
                                <span x-text="c.home_team"></span> vs <span x-text="c.away_team"></span>
                                <span class="text-slate-400 ml-1" x-text="'(' + c.league_key + ')'"></span>
                              </td>
                              <td class="text-[11px] font-mono text-slate-600">
                                <template x-for="(g, src) in c.home_goals_by_source" :key="src">
                                  <div>
                                    <span x-text="src"></span>:
                                    <span x-text="g + '-' + (c.away_goals_by_source[src] ?? '?')"></span>
                                  </div>
                                </template>
                              </td>
                              <td class="text-right text-[12px]">
                                <span class="font-semibold" x-text="c.winning_score"></span>
                                <div class="text-[10px] text-slate-500" x-text="c.winning_source"></div>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </template>

                <template x-if="healthResult.overlaps.top_overlaps_no_conflict?.length">
                  <details class="mt-2">
                    <summary class="text-[12px] text-slate-500 cursor-pointer hover:text-slate-700">
                      <span x-text="$t('overlap_no_conflict')"></span> (<span x-text="$t('total_short')"></span> <span x-text="healthResult.overlaps.top_overlaps_no_conflict.length"></span> <span x-text="$t('matches_unit')"></span>)
                    </summary>
                    <div class="mt-2 space-y-1 text-[11px] font-mono text-slate-600">
                      <template x-for="o in healthResult.overlaps.top_overlaps_no_conflict" :key="o.key">
                        <div>
                          <span x-text="o.date"></span> ·
                          <span x-text="o.home_team"></span> vs <span x-text="o.away_team"></span> ·
                          <span class="text-slate-400" x-text="o.sources.join(' + ')"></span>
                        </div>
                      </template>
                    </div>
                  </details>
                </template>
              </div>
            </template>

            <!-- Manual result entry: patch missing/wrong fixtures.
                 Slots into source-resolver as the top-priority source. -->
            <div class="bg-white rounded-xl border border-slate-200 p-5">
              <div class="flex items-center justify-between mb-2">
                <h3 class="text-lg font-semibold" x-text="$t('manual_entry_h')"></h3>
                <button @click="manualForm.open = !manualForm.open"
                        class="text-[12px] text-slate-500 hover:text-slate-800">
                  <span x-text="manualForm.open ? $t('collapse_action') : $t('expand_action')"></span>
                </button>
              </div>
              <p class="text-[12px] text-slate-500 mb-3">
                <span x-text="$t('manual_entry_intro_p1')"></span>
                <span x-text="$t('manual_entry_intro_p2')"></span>
              </p>

              <div x-show="manualForm.open" x-cloak class="space-y-3">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                  <label class="flex flex-col text-[12px]">
                    <span class="text-slate-600 mb-1" x-text="$t('health_leagues_card')"></span>
                    <input x-model="manualForm.league" type="text"
                           :placeholder="$t('manual_entry_league_ph')"
                           class="border rounded px-2 py-1 text-sm" />
                  </label>
                  <label class="flex flex-col text-[12px]">
                    <span class="text-slate-600 mb-1" x-text="$t('coverage_th_date')"></span>
                    <input x-model="manualForm.date" type="date"
                           class="border rounded px-2 py-1 text-sm" />
                  </label>
                  <label class="flex flex-col text-[12px]">
                    <span class="text-slate-600 mb-1" x-text="$t('manual_entry_stage_opt')"></span>
                    <input x-model="manualForm.stage" type="text"
                           placeholder="group / semifinal / ..."
                           class="border rounded px-2 py-1 text-sm" />
                  </label>
                  <label class="flex flex-col text-[12px]">
                    <span class="text-slate-600 mb-1" x-text="$t('coverage_th_home')"></span>
                    <input x-model="manualForm.home_team" type="text"
                           placeholder="Arsenal" class="border rounded px-2 py-1 text-sm" />
                  </label>
                  <label class="flex flex-col text-[12px]">
                    <span class="text-slate-600 mb-1" x-text="$t('coverage_th_away')"></span>
                    <input x-model="manualForm.away_team" type="text"
                           placeholder="Chelsea" class="border rounded px-2 py-1 text-sm" />
                  </label>
                  <label class="flex flex-col text-[12px]">
                    <span class="text-slate-600 mb-1" x-text="$t('audit_th_score')"></span>
                    <div class="flex items-center gap-1">
                      <input x-model.number="manualForm.home_goals" type="number"
                             min="0" max="30" class="border rounded px-2 py-1 text-sm w-16" />
                      <span class="text-slate-400">—</span>
                      <input x-model.number="manualForm.away_goals" type="number"
                             min="0" max="30" class="border rounded px-2 py-1 text-sm w-16" />
                    </div>
                  </label>
                </div>
                <label class="inline-flex items-center text-[12px] gap-2">
                  <input x-model="manualForm.neutral_site" type="checkbox" />
                  <span x-text="$t('manual_entry_neutral_site')"></span>
                </label>
                <div class="flex items-center gap-3">
                  <button @click="submitManualResult()"
                          :disabled="manualForm.busy"
                          class="bg-slate-900 text-white text-sm px-4 py-1.5 rounded hover:bg-slate-700 disabled:opacity-50">
                    <span x-text="manualForm.busy ? $t('submitting') : $t('submit')"></span>
                  </button>
                  <span x-show="manualForm.lastResult" class="text-[12px] text-emerald-700"
                        x-text="manualForm.lastResult"></span>
                  <span x-show="manualForm.lastError" class="text-[12px] text-rose-700"
                        x-text="manualForm.lastError"></span>
                </div>
              </div>
            </div>

            <div class="text-[11px] text-slate-400 text-right">
              <span x-text="$t('snapshot_time')"></span>: <span class="font-mono" x-text="healthResult.generated_at"></span>
            </div>
          </div>
        </template>
      </section>

      <!-- ===== ABOUT TAB ===== -->
      <section x-show="tab==='about'" x-cloak class="prose prose-slate max-w-3xl">
        <h2 class="text-2xl font-bold mb-3" x-text="$t('tab_about')"></h2>
        <p class="text-slate-700" x-text="$t('about_para1')"></p>
        <h3 class="font-semibold mt-6 mb-2" x-text="$t('about_why_not_high_heading')"></h3>
        <p class="text-slate-700 text-sm" x-html="$t('about_why_text')"></p>
        <h3 class="font-semibold mt-6 mb-2" x-text="$t('about_coverage_heading')"></h3>
        <ul class="text-sm text-slate-700 list-disc pl-5 space-y-1">
          <li x-html="$t('about_coverage_t1')"></li>
          <li x-html="$t('about_coverage_t2')"></li>
          <li x-html="$t('about_coverage_t3')"></li>
        </ul>
        <h3 class="font-semibold mt-6 mb-2" x-text="$t('about_limits_heading')"></h3>
        <ul class="text-sm text-slate-700 list-disc pl-5 space-y-1">
          <li x-text="$t('about_limit_1')"></li>
          <li x-text="$t('about_limit_2')"></li>
          <li x-text="$t('about_limit_3')"></li>
        </ul>
        <div class="not-prose mt-6 bg-white border border-slate-200 rounded-xl p-4 shadow-sm" x-show="doctor" x-cloak>
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-sm font-semibold text-slate-900" x-text="$t('about_doctor_heading')"></div>
              <div class="text-xs text-slate-500 mt-0.5">
                API-Football:
                <span x-text="doctor?.api_football?.present ? $t('health_configured') : $t('health_not_configured')"></span>
                · Schema
                <span x-text="doctor?.database?.schema_ok ? 'OK' : $t('about_doctor_schema_check')"></span>
                <span x-text="$t('coverage_empty_league_short')"></span>
                <span class="font-mono" x-text="doctor?.database?.empty_leagues ?? 0"></span>
                · xG
                <span class="font-mono" x-text="doctor?.database?.xg_match_rows ?? 0"></span>
              </div>
            </div>
            <span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold"
                  :class="doctor?.status === 'ready' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
                  x-text="doctor?.status"></span>
          </div>
          <template x-if="doctor?.recommended_commands?.length">
            <pre class="mt-3 bg-slate-900 text-slate-100 rounded-lg p-3 text-xs overflow-x-auto"><code x-text="doctor.recommended_commands.slice(0,4).join('\n')"></code></pre>
          </template>
        </div>
        <h3 class="font-semibold mt-6 mb-2">API</h3>
        <pre class="bg-slate-900 text-slate-100 rounded-lg p-4 text-xs overflow-x-auto"><code x-text="$t('api_endpoints_listing')"></code></pre>
      </section>
    </main>

    <footer class="border-t border-slate-200 bg-white">
      <div class="max-w-6xl mx-auto px-4 py-4 text-xs text-slate-500 flex justify-between items-center">
        <span>football-predictor · Dixon-Coles + Elo</span>
        <span x-show="stats.latest_match"><span x-text="$t('footer_latest_data')"></span> <span class="font-mono" x-text="stats.latest_match"></span></span>
      </div>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
